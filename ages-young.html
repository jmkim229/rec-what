<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="유치원, 주일학교 유아부에서 바로 쓸 수 있는 레크리에이션. 5~7세 어린이를 위한 신체·감각 놀이 추천.">
  <meta name="keywords" content="레크리에이션, 실내 레크리에이션, 야외 레크리에이션, 단체게임, 수련회 게임, 캠프 레크, 주일학교 게임, MT 게임, 팀빌딩, 소그룹 게임">
  <title>유아 레크리에이션 추천 - 5~7세 어린이 게임 모음 | 레크 뭐하지?</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8683975585186347"
       crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-75JKFQWSHP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-75JKFQWSHP');
  </script>
  <script src="js/games-data.js"></script>
</head>
<body>

  <div class="page-header" style="background: linear-gradient(135deg, #ff6b9d 0%, #ffa8cc 100%);">
    <h1>🐣 유아 레크리에이션</h1>
    <p>5~7세 어린이와 함께하는 신체·감각 놀이 모음</p>
    <div class="tags">
      <span class="tag">유아</span>
      <span class="tag">5~7세</span>
      <span class="tag">신체 놀이</span>
      <span class="tag" id="gameCountTag">로딩 중...</span>
    </div>
  </div>

  <div class="content">
    <a href="index.html" class="back-btn" style="color:#ec4899;">← 홈으로 돌아가기</a>
    <div class="game-grid" id="gameGrid"></div>
  </div>

  <footer>
    <p>© 2025 레크 뭐하지? | 모든 레크 진행자를 위한 아이디어 모음</p>
  </footer>

  <script>
    try {
      const filtered = filterGames({ ageGroup: ['young'] });
      document.getElementById('gameCountTag').textContent = filtered.length + '개 게임';
      document.getElementById('gameGrid').innerHTML = filtered.map(renderGameCard).join('');
    } catch(e) {
      document.getElementById('gameCountTag').textContent = '오류 발생';
      document.getElementById('gameGrid').innerHTML = '<p style="text-align:center;padding:40px;color:#aaa;">게임 목록을 불러오지 못했습니다. 새로고침 해주세요.</p>';
      console.error('게임 목록 로드 오류:', e);
    }
  </script>
  <script src="js/ux-helpers.js"></script>
</body>
</html>
