<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="주일학교, 캠프, 수련회를 위한 레크리에이션 아이디어 모음. 연령대별·인원별·장소별로 쉽게 찾아보세요.">
  <title>레크 뭐하지? - 레크리에이션 아이디어 모음</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>🎉 레크 뭐하지?</h1>
    <p>주일학교·캠프·수련회 레크리에이션, 바로 찾아보세요</p>
  </header>

  <nav>
    <a href="#indoor">실내</a>
    <a href="#outdoor">야외</a>
    <a href="#small">소그룹</a>
    <a href="#large">전체</a>
  </nav>

  <main>
    <section class="hero">
      <h2>오늘 레크 뭐 할지 모르겠다면?</h2>
      <p>연령대, 인원, 장소에 맞는 레크리에이션을 골라보세요 👇</p>
    </section>

    <section class="category-grid">
      <div class="card" id="indoor">
        <span class="emoji">🏠</span>
        <h3>실내 레크</h3>
        <p>좁은 공간에서도 신나게!</p>
      </div>
      <div class="card" id="outdoor">
        <span class="emoji">🌳</span>
        <h3>야외 레크</h3>
        <p>뛰고 달리고 함께!</p>
      </div>
      <div class="card" id="small">
        <span class="emoji">👥</span>
        <h3>소그룹 (5~15명)</h3>
        <p>친밀감을 높이는 게임</p>
      </div>
      <div class="card" id="large">
        <span class="emoji">🏟️</span>
        <h3>전체 활동 (30명+)</h3>
        <p>대규모 단체 레크</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 레크 뭐하지? | 주일학교 교사들을 위한 레크 아이디어</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
