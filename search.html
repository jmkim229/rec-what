  <style>
    .search-hero {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 60%, #9b59b6 100%);
      color: white;
      padding: 52px 20px 36px;
      text-align: center;
      animation: headerFadeIn 0.5s ease both;
    }
    .search-hero h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .search-hero p { font-size: 15px; opacity: 0.9; }

    /* ── 필터 패널 ── */
    .filter-panel {
      background: white;
      border-radius: 22px;
      padding: 28px 24px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 32px;
    }
    .filter-group { margin-bottom: 0; }
    .filter-row {
      padding: 16px 0;
      border-bottom: 1px solid #f3f3f3;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .filter-row:last-of-type { border-bottom: none; padding-bottom: 4px; }
    .filter-label {
      font-size: 12px;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 0.3px;
      white-space: nowrap;
      padding-top: 9px;
      min-width: 52px;
    }
    .filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 50px;
      border: 2px solid #e8e8e8;
      background: white;
      color: #666;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, color 0.18s, transform 0.12s;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      outline: none;
      line-height: 1.3;
    }
    .filter-btn:hover {
      border-color: #4f46e5;
      color: #4f46e5;
      transform: translateY(-1px);
    }
    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
      transform: translateY(-1px);
    }

    /* 초기화 버튼 */
    .reset-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .reset-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 2px solid #e8e8e8;
      border-radius: 50px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 700;
      color: #bbb;
      cursor: pointer;
      transition: all 0.18s ease;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      outline: none;
    }
    .reset-btn:hover { border-color: #FF6B35; color: #FF6B35; }

    /* ── 결과 섹션 ── */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .results-count {
      font-size: 14px;
      font-weight: 600;
      color: #888;
    }
    .results-count strong {
      color: #4f46e5;
      font-size: 20px;
      font-weight: 800;
    }

    /* 결과 카드 배지 */
    .badge-place  { background: #eef2ff; color: #4f46e5; }
    .badge-people { background: #f0fdf4; color: #16a34a; }
    .badge-time   { background: #fff8e1; color: #d97706; }

    /* 결과 없음 */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.06);
      color: #aaa;

    .no-results .no-emoji { font-size: 48px; margin-bottom: 14px; }
    .no-results p { font-size: 15px; line-height: 1.8; }

    /* ── 모바일 ── */
    @media (max-width: 560px) {
      .search-hero h1 { font-size: 22px; }
      .filter-panel { padding: 20px 16px 14px; }
      .filter-row { flex-direction: column; gap: 8px; }
      .filter-label { padding-top: 0; min-width: unset; }
      .filter-btn { font-size: 12px; padding: 6px 13px; }
    }
  </style>
</head>
<body>

  <div class="search-hero">
    <h1>🔍 어떤 레크가 필요하세요?</h1>
    <p>조건을 선택하면 딱 맞는 게임을 추천해드려요!</p>
  </div>

  <div class="content">

    <!-- 필터 패널 -->
    <div class="filter-panel">

      <div class="filter-row">
        <div class="filter-label">📍 장소</div>
        <div class="filter-buttons" data-filter="place">
          <button class="filter-btn" data-value="indoor">실내</button>
          <button class="filter-btn" data-value="outdoor">야외</button>
          <button class="filter-btn" data-value="any">상관없음</button>
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-label">👥 인원</div>
        <div class="filter-buttons" data-filter="people">
          <button class="filter-btn" data-value="tiny">5명 이하</button>
          <button class="filter-btn" data-value="small">6~15명</button>
          <button class="filter-btn" data-value="mid">16~30명</button>
          <button class="filter-btn" data-value="large">30명 이상</button>
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-label">🎂 연령대</div>
        <div class="filter-buttons" data-filter="age">
          <button class="filter-btn" data-value="young">유아 (5~7세)</button>
          <button class="filter-btn" data-value="elem-low">초등 저학년</button>
          <button class="filter-btn" data-value="elem-high">초등 고학년</button>
          <button class="filter-btn" data-value="teen">청소년</button>
          <button class="filter-btn" data-value="adult">성인</button>
          <button class="filter-btn" data-value="mixed">혼합</button>
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-label">⏱️ 시간</div>
        <div class="filter-buttons" data-filter="time">
          <button class="filter-btn" data-value="quick">5분 이내</button>
          <button class="filter-btn" data-value="short">10~15분</button>
          <button class="filter-btn" data-value="medium">20~30분</button>
          <button class="filter-btn" data-value="any">상관없음</button>
        </div>
      </div>

      <div class="reset-row">
        <button class="reset-btn" id="resetBtn">↺ 전체 초기화</button>
      </div>
    </div>

    <!-- 결과 -->
    <div class="results-bar">
      <div class="results-count"><strong id="resultCount">20</strong>개의 게임을 찾았어요</div>
    </div>
    <div id="gameResults" class="game-grid"></div>
  </div>

  <footer>
    <p>© 2025 레크 뭐하지? | 모든 레크 진행자를 위한 아이디어 모음</p>
    <p style="margin-top:8px;"><a href="privacy.html" style="color:#bbb;">개인정보처리방침</a> | <a href="terms.html" style="color:#bbb;">이용약관</a></p>
  </footer>

  <script>
  // ── 게임 데이터 ─────────────────────────────────────────────
  const GAMES = [

      place: ['indoor'], people: ['tiny','small','mid','large'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'quick',
      placeLabel: '실내', peopleLabel: '5명+', timeLabel: '5분'
    },
    {
      name: '몸으로 말해요', emoji: '🙌', url: 'games/bodyspeak.html',
      desc: '말 없이 몸으로만 표현해서 맞춰요!',
      place: ['indoor'], people: ['small','mid','large'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'short',
      placeLabel: '실내', peopleLabel: '6명+', timeLabel: '15분'
    },
    {
      name: '스피드 퀴즈', emoji: '⚡', url: 'games/speedquiz.html',
      desc: '설명하는 사람도, 맞히는 사람도 초긴장!',
      place: ['indoor'], people: ['tiny','small','mid'],
      age: ['elem-high','teen','adult','mixed'], time: 'short',
      placeLabel: '실내', peopleLabel: '4명+', timeLabel: '10분'
    },
    {
      name: '업다운 게임', emoji: '⬆️', url: 'games/updown.html',
      desc: '일어서야 할까, 앉아야 할까? 순간 판단!',
      place: ['indoor'], people: ['small','mid','large'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'quick',
      placeLabel: '실내', peopleLabel: '10명+', timeLabel: '5분'
    },
    {
      name: '이어달리기 변형', emoji: '🏃', url: 'games/relay-race.html',
      desc: '달리기에 미션을 더해 웃음이 두 배!',
      place: ['outdoor'], people: ['small','mid','large'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'medium',
      placeLabel: '야외', peopleLabel: '10명+', timeLabel: '20분'
    },
    {
      name: '보물찾기', emoji: '🗺️', url: 'games/treasure-hunt.html',
      desc: '힌트를 풀며 보물을 찾아라!',
      place: ['outdoor'], people: ['tiny','small','mid'],
      age: ['young','elem-low','elem-high'], time: 'medium',
      placeLabel: '야외', peopleLabel: '5명+', timeLabel: '30분'
    },
    {
      name: '단체 줄넘기', emoji: '🪢', url: 'games/group-jumprope.html',
      desc: '하나, 둘, 셋! 호흡 맞춰 함께 뛰어요',
      place: ['outdoor'], people: ['small','mid','large'],
      age: ['elem-low','elem-high','teen'], time: 'short',
      placeLabel: '야외', peopleLabel: '8명+', timeLabel: '15분'
    },
    {
      name: '수건 돌리기', emoji: '🧣', url: 'games/towel-pass.html',
      desc: '뒤에 수건이 놓였다면 빨리 달려라!',
      place: ['indoor','outdoor'], people: ['small','mid'],
      age: ['young','elem-low'], time: 'short',
      placeLabel: '실내·야외', peopleLabel: '8명+', timeLabel: '10분'
    },
    {
      name: '풍선 터뜨리기', emoji: '🎈', url: 'games/balloon-pop.html',
      desc: '내 풍선은 지키고, 상대 풍선은 터뜨려라!',
      place: ['indoor','outdoor'], people: ['small','mid','large'],
      age: ['young','elem-low','elem-high'], time: 'short',
      placeLabel: '실내·야외', peopleLabel: '6명+', timeLabel: '15분'
    },
    {
      name: '마피아 게임', emoji: '🕵️', url: 'games/mafia.html',
      desc: '마피아를 찾아라! 눈치와 심리전의 대결',
      place: ['indoor'], people: ['small','mid'],
      age: ['elem-high','teen','adult','mixed'], time: 'medium',
      placeLabel: '실내', peopleLabel: '6명+', timeLabel: '30분'
    },
    {
      name: '이심전심', emoji: '💞', url: 'games/mind-match.html',
      desc: '같은 단어를 동시에! 우리는 통하고 있어요',
      place: ['indoor'], people: ['tiny','small','mid'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'short',
      placeLabel: '실내', peopleLabel: '4명+', timeLabel: '10분'
    },
    {
      name: '진실 혹은 거짓', emoji: '✅', url: 'games/truth-or-lie.html',
      desc: '셋 중 하나는 거짓말! 진짜를 가려내세요',
      place: ['indoor'], people: ['tiny','small'],
      age: ['elem-high','teen','adult','mixed'], time: 'short',
      placeLabel: '실내', peopleLabel: '4명+', timeLabel: '10분'
    },
    {
      name: '끝말잇기 배틀', emoji: '💬', url: 'games/wordchain.html',
      desc: '제한 시간 안에 이어라! 막히면 탈락!',
      place: ['indoor'], people: ['tiny','small'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'short',
      placeLabel: '실내', peopleLabel: '4명+', timeLabel: '10분'
    },
    {
      name: 'OX 퀴즈', emoji: '⭕', url: 'games/ox-quiz.html',
      desc: 'O냐 X냐! 마지막까지 살아남아라',
      place: ['indoor','outdoor'], people: ['small','mid','large'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'short',
      placeLabel: '실내·야외', peopleLabel: '10명+', timeLabel: '15분'
    },
    {
      name: '빙고 게임', emoji: '🎱', url: 'games/bingo.html',
      desc: '서로의 이름을 채워라! 빙고 완성까지 달려요',
      place: ['indoor'], people: ['small','mid','large'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'medium',
      placeLabel: '실내', peopleLabel: '10명+', timeLabel: '20분'
    },
    {
      name: '팀 대항 릴레이', emoji: '🏅', url: 'games/team-relay.html',
      desc: '미션을 릴레이로! 팀워크의 정수',
      place: ['outdoor'], people: ['mid','large'],
      age: ['elem-low','elem-high','teen','adult','mixed'], time: 'medium',
      placeLabel: '야외', peopleLabel: '16명+', timeLabel: '30분'
    },
    {
      name: '동물 흉내 게임', emoji: '🐘', url: 'games/animal-imitate.html',
      desc: '코끼리처럼, 토끼처럼! 온몸으로 표현해요',
      place: ['indoor','outdoor'], people: ['tiny','small','mid'],
      age: ['young','elem-low'], time: 'quick',
      placeLabel: '실내·야외', peopleLabel: '5명+', timeLabel: '5분'
    },
    {
      name: '색깔 찾기', emoji: '🎨', url: 'games/color-hunt.html',
      desc: '빨강! 파랑! 외치면 달려가서 손을 얹어요',
      place: ['indoor','outdoor'], people: ['tiny','small','mid'],
      age: ['young'], time: 'quick',
      placeLabel: '실내·야외', peopleLabel: '5명+', timeLabel: '5분'
    },
    {
      name: '풍선 놀이', emoji: '🎈', url: 'games/balloon-play.html',
      desc: '풍선을 땅에 닿지 않게! 두둥실 함께 놀아요',
      place: ['indoor','outdoor'], people: ['tiny','small','mid'],
      age: ['young','elem-low'], time: 'short',
      placeLabel: '실내·야외', peopleLabel: '5명+', timeLabel: '10분'
    },
  ];

  // ── 필터 상태 ────────────────────────────────────────────────
  const filters = { place: null, people: null, age: null, time: null };

  // ── 매칭 로직 ────────────────────────────────────────────────
  function matchesFilter(g) {
    const { place, people, age, time } = filters;

    if (place && place !== 'any') {
      if (!g.place.includes(place)) return false;
    }
    if (people && !g.people.includes(people)) return false;
    if (age && !g.age.includes(age)) return false;
    if (time && time !== 'any') {
      if (time === 'quick' && g.time !== 'quick') return false;
      if (time === 'short' && g.time === 'medium') return false;
      // 'medium' = 20~30분 선택 시 모든 시간 표시
    }
    return true;
  }

  // ── 렌더링 ──────────────────────────────────────────────────
  function render() {
    const matched = GAMES.filter(matchesFilter);
    const container = document.getElementById('gameResults');
    document.getElementById('resultCount').textContent = matched.length;

    if (matched.length === 0) {
      container.innerHTML = `
        <div class="no-results">
          <div class="no-emoji">😅</div>
          <p>조건에 맞는 게임이 없어요<br>조건을 바꿔보세요!</p>
        </div>`;
      return;
    }

    container.innerHTML = matched.map(g => `
      <a href="${g.url}" class="game-card">
        <span class="game-emoji">${g.emoji}</span>
        <h3>${g.name}</h3>
        <p class="desc">${g.desc}</p>
        <div class="meta">
          <span class="meta-badge badge-place">${g.placeLabel}</span>
          <span class="meta-badge badge-people">${g.peopleLabel}</span>
          <span class="meta-badge badge-time">${g.timeLabel}</span>
        </div>
      </a>
    `).join('');
  }

  // ── 버튼 이벤트 ─────────────────────────────────────────────
  document.querySelectorAll('.filter-buttons').forEach(group => {
    const key = group.dataset.filter;
    group.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.value;
        if (filters[key] === val) {
          filters[key] = null;
          btn.classList.remove('active');
        } else {
          group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          filters[key] = val;
          btn.classList.add('active');
        }
        render();
      });
    });
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    Object.keys(filters).forEach(k => filters[k] = null);
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    render();
  });

  render();
  </script>
</body>
</html>
