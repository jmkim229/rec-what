  <title>🔢 스무고개 질문 카운터 | 레크 뭐하지?</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overflow-x: hidden;
    }

    /* ── 헤더 ── */
    .tool-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .back-link {
      color: #a78bfa;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .back-link:hover { color: #c4b5fd; }
    .header-title {
      font-size: 15px;
      font-weight: 800;
      color: #f1f5f9;
      flex: 1;
    }
    .round-badge {
      background: #1e293b;
      border-radius: 10px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
    }
    .round-badge b { color: #a78bfa; }

    /* ── 질문 수 설정 탭 ── */
    .limit-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .limit-tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #1e293b;
      background: #1e293b;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .limit-tab.active {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.15);
      color: #c4b5fd;
    }

    /* ── 카운터 영역 ── */
    .counter-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 8px;
    }
    .counter-label {
      font-size: 14px;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 4px;
    }
    .counter-num {
      font-size: clamp(88px, 24vmin, 150px);
      font-weight: 900;
      line-height: 1.05;
      color: #a78bfa;
      letter-spacing: -2px;
      transition: color 0.3s;
      user-select: none;
    }
    .counter-num.warn { color: #fbbf24; }
    .counter-num.danger { color: #f87171; }
    .counter-num.pop { animation: pop 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .counter-sub {
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-top: 2px;
    }

    /* ── 답변 기록 ── */
    .log-wrap {
      padding: 10px 14px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }
    .log-title {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 6px;
      text-align: center;
    }
    .log-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      min-height: 26px;
    }
    .log-chip {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 9px;
      border-radius: 14px;
      animation: chipIn 0.2s cubic-bezier(0.34,1.4,0.64,1) both;
      user-select: none;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }
    .log-chip.yes { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.35); }
    .log-chip.no  { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }

    /* ── 액션 버튼 ── */
    .action-area {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }
    .yn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .yn-btn {
      padding: 22px 10px;
      border-radius: 18px;
      border: none;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      color: white;
      transition: transform 0.12s, box-shadow 0.12s;
      user-select: none;
    }
    .yn-btn:active { transform: scale(0.96); }
    .yes-btn {
      background: linear-gradient(135deg, #065f46, #34d399);
      box-shadow: 0 6px 20px rgba(52,211,153,0.3);
    }
    .yes-btn:hover { transform: translateY(-2px); box-shadow: 0 9px 26px rgba(52,211,153,0.4); }
    .no-btn {
      background: linear-gradient(135deg, #991b1b, #f87171);
      box-shadow: 0 6px 20px rgba(248,113,113,0.3);
    }
    .no-btn:hover { transform: translateY(-2px); box-shadow: 0 9px 26px rgba(248,113,113,0.4); }
    .yn-sub { display: block; font-size: 11px; font-weight: 600; opacity: 0.75; margin-top: 3px; }

    .guess-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #6d28d9, #a78bfa);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 5px 18px rgba(139,92,246,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .guess-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,92,246,0.5); }
    .guess-btn:active { transform: scale(0.97); }

    .sub-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .sub-btn {
      padding: 11px;
      border-radius: 11px;
      border: 1.5px solid #1e293b;
      background: transparent;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .sub-btn:hover { border-color: #334155; color: #94a3b8; }
    .sub-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── 정답 선언 패널 ── */
    .guess-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      background: #1e293b;
      border: 1.5px solid rgba(167,139,250,0.35);
      border-radius: 16px;
      padding: 14px;
      animation: fadeUp 0.2s ease both;
    }
    .guess-panel.show { display: flex; }
    .guess-title {
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      color: #c4b5fd;
    }
    .guess-desc { font-size: 12px; color: #94a3b8; text-align: center; }
    .guess-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .g-correct {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #065f46, #34d399);
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .g-wrong {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #991b1b, #f87171);
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .g-cancel {
      padding: 9px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .g-cancel:hover { color: #94a3b8; }

    /* ── 결과 오버레이 ── */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 24px;
    }
    .result-overlay.show { display: flex; }
    .result-card {
      background: #1e293b;
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      border: 1.5px solid rgba(167,139,250,0.3);
      animation: cardIn 0.35s cubic-bezier(0.34,1.4,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .result-emoji { font-size: 62px; margin-bottom: 12px; }
    .result-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    .result-title.win  { color: #34d399; }
    .result-title.lose { color: #fbbf24; }
    .result-sub { font-size: 14px; color: #94a3b8; margin-bottom: 22px; line-height: 1.5; }
    .result-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #6d28d9, #a78bfa);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 5px 18px rgba(139,92,246,0.35);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

<body>

<!-- ── 헤더 ── -->
<div class="tool-header">
  <a href="twenty-questions.html" class="back-link">← 게임 설명</a>
  <span class="header-title">🔢 스무고개 질문 카운터</span>
  <span class="round-badge">라운드 <b id="roundNum">1</b></span>
</div>

<!-- ── 질문 수 설정 ── -->
<div class="limit-tabs" id="limitTabs">
  <button class="limit-tab" data-limit="10">10개</button>
  <button class="limit-tab" data-limit="15">15개</button>
  <button class="limit-tab active" data-limit="20">20개</button>
  <button class="limit-tab" data-limit="30">30개</button>
</div>

<!-- ── 카운터 ── -->
<div class="counter-area">
  <div class="counter-label">남은 질문</div>
  <div class="counter-num" id="counterNum">20</div>
  <div class="counter-sub" id="counterSub">질문에 답하면 아래 버튼을 눌러 기록하세요</div>
</div>

<!-- ── 답변 기록 ── -->
<div class="log-wrap">
  <div class="log-title">답변 기록</div>
  <div class="log-chips" id="logChips"></div>
</div>

<!-- ── 액션 ── -->
<div class="action-area">
  <div class="yn-row">
    <button class="yn-btn yes-btn" onclick="record(true)">⭕ 예<span class="yn-sub">질문 1개 사용</span></button>
    <button class="yn-btn no-btn" onclick="record(false)">❌ 아니오<span class="yn-sub">질문 1개 사용</span></button>
  </div>

  <button class="guess-btn" id="guessBtn" onclick="openGuess()">💡 정답 선언!</button>

  <div class="guess-panel" id="guessPanel">
    <div class="guess-title">💡 정답 선언</div>
    <div class="guess-desc">정답 선언은 질문 횟수를 사용하지 않아요. 대신 틀리면 선언한 사람은 이번 라운드 탈락!</div>
    <div class="guess-row">
      <button class="g-correct" onclick="endRound('win')">🎉 맞혔다!</button>
      <button class="g-wrong" onclick="wrongGuess()">😵 틀렸다</button>
    </div>
    <button class="g-cancel" onclick="closeGuess()">취소</button>
  </div>

  <div class="sub-row">
    <button class="sub-btn" id="undoBtn" onclick="undo()" disabled>↩️ 무르기</button>
    <button class="sub-btn" onclick="resetRound()">🔄 라운드 초기화</button>
  </div>
</div>

<!-- ── 결과 오버레이 ── -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title win" id="resultTitle">정답!</div>
    <div class="result-sub" id="resultSub"></div>
    <button class="result-btn" onclick="nextRound()">다음 라운드 시작 →</button>
  </div>
</div>

<script>
/* ── 상태 ── */
let S = {
  limit: 20,
  used: 0,
  log: [],        // true = 예, false = 아니오
  round: 1
};

const $ = id => document.getElementById(id);

function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

/* ── 질문 수 설정 탭 ── */
document.querySelectorAll('.limit-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.limit-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.limit = parseInt(btn.dataset.limit, 10);
    resetRound();
  });
});

/* ── 렌더링 ── */
function render() {
  const remaining = S.limit - S.used;
  const num = $('counterNum');
  num.textContent = remaining;

  num.classList.remove('warn', 'danger');
  if (remaining <= 3) num.classList.add('danger');
  else if (remaining <= 7) num.classList.add('warn');

  // 팝 애니메이션 재실행
  num.classList.remove('pop');
  void num.offsetWidth;
  num.classList.add('pop');

  $('counterSub').textContent = S.used === 0
    ? '질문에 답하면 아래 버튼을 눌러 기록하세요'
    : `질문 ${S.used}개 사용 · 예 ${S.log.filter(v => v).length} / 아니오 ${S.log.filter(v => !v).length}`;

  // 로그 칩
  const chips = $('logChips');
  chips.innerHTML = '';
  S.log.forEach((v, i) => {
    const chip = document.createElement('span');
    chip.className = 'log-chip ' + (v ? 'yes' : 'no');
    chip.textContent = `${i + 1}. ${v ? '예' : '아니오'}`;
    chips.appendChild(chip);
  });

  $('undoBtn').disabled = S.log.length === 0;
  $('roundNum').textContent = S.round;
}

/* ── 질문 기록 ── */
function record(isYes) {
  if (S.used >= S.limit) return;
  S.log.push(isYes);
  S.used++;
  vibrate(20);
  render();

  if (S.used >= S.limit) {
    setTimeout(() => endRound('lose'), 350);
  }
}

/* ── 무르기 ── */
function undo() {
  if (S.log.length === 0) return;
  S.log.pop();
  S.used--;
  render();
}

/* ── 정답 선언 ── */
function openGuess() {
  $('guessPanel').classList.add('show');
  $('guessBtn').style.display = 'none';
}
function closeGuess() {
  $('guessPanel').classList.remove('show');
  $('guessBtn').style.display = 'block';
}
function wrongGuess() {
  closeGuess();
  vibrate([40, 60, 40]);
  const sub = $('counterSub');
  sub.textContent = '😵 선언 실패! 선언한 사람은 이번 라운드 탈락. 게임 계속!';
}

/* ── 라운드 종료 ── */
function endRound(result) {
  closeGuess();
  const overlay = $('resultOverlay');
  if (result === 'win') {
    $('resultEmoji').textContent = '🎉';
    $('resultTitle').textContent = '정답!';
    $('resultTitle').className = 'result-title win';
    $('resultSub').innerHTML = `질문 <b>${S.used}개</b>만에 맞혔어요!<br>맞힌 사람이 다음 출제자가 됩니다.`;
    vibrate([50, 50, 100]);
  } else {
    $('resultEmoji').textContent = '🛡️';
    $('resultTitle').textContent = '출제자 승리!';
    $('resultTitle').className = 'result-title lose';
    $('resultSub').innerHTML = `질문 ${S.limit}개를 모두 사용했어요.<br>출제자는 정답을 공개해 주세요!`;
    vibrate(120);
  }
  overlay.classList.add('show');
}

function nextRound() {
  $('resultOverlay').classList.remove('show');
  S.round++;
  S.used = 0;
  S.log = [];
  render();
}

function resetRound() {
  S.used = 0;
  S.log = [];
  closeGuess();
  render();
}

/* ── 초기화 ── */
render();
</script>
</body>
</html>
