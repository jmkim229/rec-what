<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="너도나도 게임 주제 추천 도구. 카테고리를 선택하면 랜덤으로 주제를 뽑아드려요.">
  <title>🙋 너도나도 주제 추천 도구 | 레크 뭐하지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── 공통 헤더 ── */
    .tool-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .back-link {
      color: #fb923c;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-link:hover { color: #fdba74; }

    /* ══════════════════════════════
       화면 1 — 카테고리 선택
    ══════════════════════════════ */
    #screen-select {
      background: #0f172a;
    }
    .select-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px 18px 40px;
    }
    .select-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .select-sub {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .cat-section-label {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    .cat-btn {
      padding: 16px 10px;
      border-radius: 14px;
      border: 2px solid #1e293b;
      background: #1e293b;
      color: #cbd5e1;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-align: center;
      line-height: 1.3;
    }
    .cat-btn:hover {
      border-color: #f97316;
      background: rgba(249,115,22,0.1);
      color: #fdba74;
    }
    .cat-btn.selected {
      border-color: #f97316;
      background: rgba(249,115,22,0.18);
      color: #fb923c;
    }
    .cat-btn .cat-emoji {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .pick-btn {
      width: 100%;
      padding: 20px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(135deg, #ea580c, #f97316);
      color: white;
      font-size: 19px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(249,115,22,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
      letter-spacing: -0.3px;
    }
    .pick-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(249,115,22,0.55);
    }
    .pick-btn:active {
      transform: scale(0.98);
    }

    /* ══════════════════════════════
       화면 2 — 주제 표시
    ══════════════════════════════ */
    #screen-result {
      background: linear-gradient(160deg, #0f172a 0%, #1a1035 100%);
    }
    .result-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 0;
      text-align: center;
    }

    .result-cat-badge {
      font-size: 14px;
      font-weight: 700;
      color: #fb923c;
      background: rgba(249,115,22,0.15);
      border: 1.5px solid rgba(249,115,22,0.3);
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 28px;
    }

    .topic-card {
      width: 100%;
      max-width: 340px;
      background: linear-gradient(160deg, #1e1b4b, #312e81);
      border: 2px solid rgba(167,139,250,0.35);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 16px 48px rgba(99,102,241,0.35);
      margin-bottom: 32px;
    }
    .topic-card.animate {
      animation: topicReveal 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes topicReveal {
      from { opacity: 0; transform: scale(0.7) rotateY(20deg); }
      to   { opacity: 1; transform: scale(1) rotateY(0deg); }
    }

    .topic-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(167,139,250,0.7);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }
    .topic-word {
      font-size: 30px;
      font-weight: 800;
      color: white;
      line-height: 1.35;
      word-break: keep-all;
    }
    .topic-deco {
      font-size: 36px;
      margin-top: 16px;
    }

    .result-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }
    .action-btn {
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .action-btn-primary {
      background: linear-gradient(135deg, #ea580c, #f97316);
      color: white;
      box-shadow: 0 4px 16px rgba(249,115,22,0.4);
    }
    .action-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(249,115,22,0.5);
    }
    .action-btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1.5px solid #334155;
    }
    .action-btn-secondary:hover {
      background: #263347;
      color: #cbd5e1;
    }

    /* 스피닝 로딩 */
    .spinning {
      animation: spin 0.5s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- ══ 화면 1: 카테고리 선택 ══ -->
<div id="screen-select" class="screen active">
  <div class="tool-header">
    <a href="me-too.html" class="back-link">← 게임 설명으로 돌아가기</a>
  </div>
  <div class="select-body">
    <div class="select-title">🙋 너도나도 주제 추천</div>
    <div class="select-sub">카테고리를 고르면 랜덤으로 주제를 뽑아드려요</div>

    <div class="cat-section-label">카테고리 선택</div>
    <div class="cat-grid">
      <button class="cat-btn selected" data-cat="all">
        <span class="cat-emoji">🎲</span>전체 랜덤
      </button>
      <button class="cat-btn" data-cat="season">
        <span class="cat-emoji">🌸</span>계절·날씨
      </button>
      <button class="cat-btn" data-cat="school">
        <span class="cat-emoji">🏫</span>학교·일상
      </button>
      <button class="cat-btn" data-cat="food">
        <span class="cat-emoji">🍔</span>음식
      </button>
      <button class="cat-btn" data-cat="culture">

      <button class="cat-btn" data-cat="activity">

      </button>
      <button class="cat-btn" data-cat="nature">
        <span class="cat-emoji">🐶</span>동물·자연
      </button>
      <button class="cat-btn" data-cat="church">
        <span class="cat-emoji">⛪</span>교회·신앙
      </button>
      <button class="cat-btn" data-cat="fun">
        <span class="cat-emoji">😂</span>재미·엉뚱
      </button>
    </div>

    <button class="pick-btn" id="pick-btn">🎯 주제 뽑기</button>
  </div>
</div>

<!-- ══ 화면 2: 주제 표시 ══ -->
<div id="screen-result" class="screen">
  <div class="tool-header">
    <a href="#" class="back-link" id="back-to-select">← 카테고리 변경</a>
  </div>
  <div class="result-body">
    <div class="result-cat-badge" id="result-cat-badge">🎲 전체 랜덤</div>
    <div class="topic-card" id="topic-card">
      <div class="topic-label">오늘의 주제</div>
      <div class="topic-word" id="topic-word">주제가 여기에 표시됩니다</div>
      <div class="topic-deco" id="topic-deco">✨</div>
    </div>
    <div class="result-actions">
      <button class="action-btn action-btn-primary" id="repick-btn">🔄 다시 뽑기</button>
      <button class="action-btn action-btn-secondary" id="change-cat-btn">📂 카테고리 변경</button>
    </div>
  </div>
</div>

const CAT_NAMES = {
  all:      '🎲 전체 랜덤',
  season:   '🌸 계절·날씨',
  school:   '🏫 학교·일상',
  food:     '🍔 음식',
  culture:  '🎬 문화·연예',
  activity: '🏃 활동·취미',
  nature:   '🐶 동물·자연',
  church:   '⛪ 교회·신앙',
  fun:      '😂 재미·엉뚱'
};

const CAT_DECOS = {
  all: '🎲', season: '🌸', school: '📚', food: '🍽️',
  culture: '🎬', activity: '🏅', nature: '🌿', church: '✝️', fun: '🤣'
};

let currentCat = 'all';
let lastTopic = '';

function getAllTopics() {
  return Object.values(TOPICS).flat();
}

function pickTopic(cat) {
  const pool = cat === 'all' ? getAllTopics() : TOPICS[cat];
  let filtered = pool.filter(t => t !== lastTopic);
  if (filtered.length === 0) filtered = pool;
  const pick = filtered[Math.floor(Math.random() * filtered.length)];
  lastTopic = pick;
  return pick;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function animatePick(topic, cat) {
  const card = document.getElementById('topic-card');
  const wordEl = document.getElementById('topic-word');
  const decoEl = document.getElementById('topic-deco');
  const badgeEl = document.getElementById('result-cat-badge');

  badgeEl.textContent = CAT_NAMES[cat];
  decoEl.textContent = CAT_DECOS[cat] || '✨';

  card.classList.remove('animate');
  void card.offsetWidth;
  wordEl.textContent = topic;
  card.classList.add('animate');
}

document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentCat = btn.dataset.cat;
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('selected', b === btn));
  });
});

document.getElementById('pick-btn').addEventListener('click', () => {
  const topic = pickTopic(currentCat);
  animatePick(topic, currentCat);
  showScreen('result');
});

document.getElementById('repick-btn').addEventListener('click', () => {
  const topic = pickTopic(currentCat);
  animatePick(topic, currentCat);
});

document.getElementById('change-cat-btn').addEventListener('click', () => {
  showScreen('select');
});

document.getElementById('back-to-select').addEventListener('click', (e) => {
  e.preventDefault();
  showScreen('select');
});
</script>
