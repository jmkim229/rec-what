<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="이구동성 진행자 도구. 4·5·6글자 단어를 랜덤으로 뽑아 글자별로 표시해드려요.">
  <title>🎤 이구동성 도구 | 레크 뭐하지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── 헤더 ── */
    .tool-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .back-link {
      color: #ec4899;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-link:hover { color: #f9a8d4; }

    /* ── 컨트롤 영역 ── */
    .controls {
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ctrl-label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .btn-group {
      display: flex;
      gap: 6px;
    }
    .seg-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      border: 2px solid #1e293b;
      background: #1e293b;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.15s;
    }
    .seg-btn.active {
      border-color: #ec4899;
      background: rgba(236,72,153,0.15);
      color: #f9a8d4;
    }

    /* ── 단어 디스플레이 ── */
    .display-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      gap: 16px;
    }
    .placeholder {
      text-align: center;
      color: #334155;
    }
    .placeholder .icon {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
    }
    .placeholder .msg {
      font-size: 15px;
      font-weight: 600;
    }

    .word-display {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .char-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 60px;
    }
    .char-num {
      font-size: 11px;
      font-weight: 700;
      color: #ec4899;
      letter-spacing: 0.03em;
    }
    .char-tile {
      width: 64px;
      height: 72px;
      border-radius: 14px;
      background: #1e293b;
      border: 2px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(26px, 8vw, 36px);
      font-weight: 800;
      color: #f1f5f9;
      transition: all 0.2s;
    }
    .char-tile.highlighted {
      background: rgba(236,72,153,0.18);
      border-color: #ec4899;
      color: #f9a8d4;
      transform: scale(1.06);
      box-shadow: 0 0 16px rgba(236,72,153,0.3);
    }
    .char-tile.dimmed {
      opacity: 0.25;
    }
    .char-num.dimmed { color: #475569; }

    .hint-notice {
      font-size: 14px;
      font-weight: 700;
      color: #f9a8d4;
      text-align: center;
      padding: 12px 16px;
      background: rgba(236,72,153,0.1);
      border-radius: 10px;
      border: 1px solid rgba(236,72,153,0.25);
      line-height: 1.6;
    }

    /* ── 버튼 영역 ── */
    .action-area {
      padding: 12px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .draw-btn {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #ec4899, #f43f5e);
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(236,72,153,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(236,72,153,0.55);
    }
    .draw-btn:active { transform: scale(0.97); }

    .hint-btn-row {
      display: flex;
      gap: 8px;
    }
    .hint-action-btn {
      flex: 1;
      padding: 14px 8px;
      border-radius: 14px;
      border: 2px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .hint-action-btn:hover { border-color: #ec4899; color: #f9a8d4; background: rgba(236,72,153,0.08); }
    .hint-action-btn:active { transform: scale(0.97); }

    .clear-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #334155;
      background: transparent;
      color: #64748b;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: none;
    }
    .clear-btn.visible { display: block; }
    .clear-btn:hover { border-color: #475569; color: #94a3b8; }
    .clear-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="tool-header">
  <a href="iguseong.html" class="back-link">← 게임 설명으로 돌아가기</a>
</div>

<!-- 컨트롤 -->
<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">글자 수</span>
    <div class="btn-group" id="lenGroup">
      <button class="seg-btn active" data-len="4">4글자</button>
      <button class="seg-btn" data-len="5">5글자</button>
      <button class="seg-btn" data-len="6">6글자</button>
    </div>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">카테고리</span>
    <div class="btn-group" id="catGroup">
      <button class="seg-btn active" data-cat="전체">전체</button>
      <button class="seg-btn" data-cat="동물">동물</button>
      <button class="seg-btn" data-cat="음식">음식</button>
      <button class="seg-btn" data-cat="일상어">일상어</button>
    </div>
  </div>
</div>

<!-- 단어 디스플레이 -->
<div class="display-area" id="displayArea">
  <div class="placeholder" id="placeholder">
    <span class="icon">🎤</span>
    <span class="msg">버튼을 눌러 단어를 뽑아요!</span>
  </div>
  <div class="word-display" id="wordDisplay" style="display:none;"></div>
  <div class="hint-notice" id="hintNotice" style="display:none;"></div>
</div>

<!-- 액션 버튼 -->
<div class="action-area">
  <button class="draw-btn" id="drawBtn">🎤 단어 뽑기</button>
  <div class="hint-btn-row">
    <button class="hint-action-btn" id="hint2Btn">🙈 힌트: 2명만</button>
    <button class="hint-action-btn" id="hint3Btn">🙈 힌트: 3명만</button>
  </div>
  <button class="clear-btn" id="clearBtn">↩ 전체 다시 보기</button>
</div>

<script>
const WORDS = [
  // 4글자 일상어
  {word:"사랑해요", len:4, cat:"일상어"},
  {word:"대한민국", len:4, cat:"일상어"},
  {word:"가나다라", len:4, cat:"일상어"},
  {word:"행복하다", len:4, cat:"일상어"},
  {word:"즐거워요", len:4, cat:"일상어"},
  {word:"감사해요", len:4, cat:"일상어"},
  {word:"파이팅해", len:4, cat:"일상어"},
  {word:"잘지내요", len:4, cat:"일상어"},
  {word:"힘내세요", len:4, cat:"일상어"},
  {word:"좋아해요", len:4, cat:"일상어"},
  // 4글자 동물
  {word:"무당벌레", len:4, cat:"동물"},
  {word:"고슴도치", len:4, cat:"동물"},
  {word:"반딧불이", len:4, cat:"동물"},
  {word:"호랑나비", len:4, cat:"동물"},
  // 4글자 음식
  {word:"김치찌개", len:4, cat:"음식"},
  {word:"된장찌개", len:4, cat:"음식"},
  {word:"순대국밥", len:4, cat:"음식"},
  {word:"돼지국밥", len:4, cat:"음식"},
  {word:"오징어회", len:4, cat:"음식"},
  {word:"비빔냉면", len:4, cat:"음식"},
  // 5글자 일상어
  {word:"생일축하해", len:5, cat:"일상어"},
  {word:"즐거운하루", len:5, cat:"일상어"},
  {word:"친구사랑해", len:5, cat:"일상어"},
  {word:"힘차게달려", len:5, cat:"일상어"},
  {word:"하나둘셋넷", len:5, cat:"일상어"},
  // 5글자 동물
  {word:"장수풍뎅이", len:5, cat:"동물"},
  {word:"바다거북이", len:5, cat:"동물"},
  {word:"황금독수리", len:5, cat:"동물"},
  {word:"무지개송어", len:5, cat:"동물"},
  // 5글자 음식
  {word:"닭갈비볶음", len:5, cat:"음식"},
  {word:"계란후라이", len:5, cat:"음식"},
  {word:"쌀국수요리", len:5, cat:"음식"},
  // 6글자 일상어
  {word:"대한민국만세", len:6, cat:"일상어"},
  {word:"행복한우리들", len:6, cat:"일상어"},
  {word:"모두함께해요", len:6, cat:"일상어"},
  {word:"오늘도파이팅", len:6, cat:"일상어"},
  // 6글자 동물
  {word:"귀여운다람쥐", len:6, cat:"동물"},
  {word:"아기공룡둘리", len:6, cat:"동물"},
  // 6글자 음식
  {word:"맛있는밥먹자", len:6, cat:"음식"},
  {word:"맛있게드세요", len:6, cat:"음식"},
];

let S = {
  len: 4,
  cat: '전체',
  currentWord: null,
  highlightedIdx: [],  // 힌트로 강조된 글자 인덱스
  hintActive: false,
};

/* ── 컨트롤 이벤트 ── */
document.getElementById('lenGroup').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  S.len = parseInt(btn.dataset.len);
  setActive('lenGroup', btn);
  resetDisplay();
});

document.getElementById('catGroup').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  S.cat = btn.dataset.cat;
  setActive('catGroup', btn);
  resetDisplay();
});

function setActive(groupId, activeBtn) {
  document.getElementById(groupId).querySelectorAll('.seg-btn').forEach(b => {
    b.classList.toggle('active', b === activeBtn);
  });
}

/* ── 단어 뽑기 ── */
document.getElementById('drawBtn').addEventListener('click', drawWord);

function drawWord() {
  const pool = WORDS.filter(w => w.len === S.len && (S.cat === '전체' || w.cat === S.cat));
  if (pool.length === 0) {
    alert('해당 조건에 맞는 단어가 없어요. 글자 수나 카테고리를 바꿔보세요.');
    return;
  }
  let picked = pool[Math.floor(Math.random() * pool.length)];
  if (pool.length > 1 && S.currentWord && picked.word === S.currentWord.word) {
    const others = pool.filter(w => w.word !== S.currentWord.word);
    picked = others[Math.floor(Math.random() * others.length)];
  }
  S.currentWord = picked;
  S.hintActive = false;
  S.highlightedIdx = [];
  renderWord();
}

/* ── 힌트 버튼 ── */
document.getElementById('hint2Btn').addEventListener('click', () => applyHint(2));
document.getElementById('hint3Btn').addEventListener('click', () => applyHint(3));

function applyHint(count) {
  if (!S.currentWord) {
    alert('먼저 단어를 뽑아주세요!');
    return;
  }
  const total = S.currentWord.len;
  const n = Math.min(count, total);
  const indices = [...Array(total).keys()];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  S.highlightedIdx = indices.slice(0, n).sort((a, b) => a - b);
  S.hintActive = true;
  renderWord();
}

/* ── 전체 다시 보기 ── */
document.getElementById('clearBtn').addEventListener('click', () => {
  S.hintActive = false;
  S.highlightedIdx = [];
  renderWord();
});

/* ── 렌더링 ── */
function renderWord() {
  if (!S.currentWord) return;

  document.getElementById('placeholder').style.display = 'none';
  const wordDisplay = document.getElementById('wordDisplay');
  wordDisplay.style.display = 'flex';

  const chars = [...S.currentWord.word];

  wordDisplay.innerHTML = chars.map((ch, i) => {
    let tileClass = 'char-tile';
    let numClass = 'char-num';
    if (S.hintActive) {
      if (S.highlightedIdx.includes(i)) {
        tileClass += ' highlighted';
      } else {
        tileClass += ' dimmed';
        numClass += ' dimmed';
      }
    }
    return `<div class="char-box">
      <span class="${numClass}">${i + 1}번</span>
      <div class="${tileClass}">${ch}</div>
    </div>`;
  }).join('');

  const hintNotice = document.getElementById('hintNotice');
  const clearBtn = document.getElementById('clearBtn');

  if (S.hintActive) {
    const nums = S.highlightedIdx.map(i => `${i + 1}번`).join(', ');
    hintNotice.textContent = `🔔 이 번호 사람들만 다시 외쳐주세요: ${nums}`;
    hintNotice.style.display = 'block';
    clearBtn.classList.add('visible');
  } else {
    hintNotice.style.display = 'none';
    clearBtn.classList.remove('visible');
  }
}

function resetDisplay() {
  S.currentWord = null;
  S.hintActive = false;
  S.highlightedIdx = [];
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('wordDisplay').style.display = 'none';
  document.getElementById('hintNotice').style.display = 'none';
  document.getElementById('clearBtn').classList.remove('visible');
}
</script>
</body>
</html>
