<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="이구동성 진행자 도구. 팀원 수(글자 수)를 정하면 그 인원에 맞는 단어만 랜덤 출제해드려요.">
  <title>🎤 이구동성 도구 | 레크 뭐하지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── 헤더 ── */
    .tool-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .back-link {
      color: #ec4899;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-link:hover { color: #f9a8d4; }

    /* ── 컨트롤 영역 ── */
    .controls {
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ctrl-label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .ctrl-note {
      font-size: 11px;
      color: #475569;
      margin-top: 2px;
    }
    .person-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: #f9a8d4;
      background: rgba(236,72,153,0.12);
      border: 1px solid rgba(236,72,153,0.25);
      border-radius: 8px;
      padding: 3px 10px;
      margin-top: 2px;
    }
    .btn-group {
      display: flex;
      gap: 6px;
    }
    .seg-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      border: 2px solid #1e293b;
      background: #1e293b;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.15s;
    }
    .seg-btn.active {
      border-color: #ec4899;
      background: rgba(236,72,153,0.15);
      color: #f9a8d4;
    }

    /* ── 단어 디스플레이 ── */
    .display-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      gap: 16px;
    }
    .placeholder {
      text-align: center;
      color: #334155;
    }
    .placeholder .icon {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
    }
    .placeholder .msg {
      font-size: 15px;
      font-weight: 600;
    }

    .word-display {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .char-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 60px;
    }
    .char-num {
      font-size: 11px;
      font-weight: 700;
      color: #ec4899;
      letter-spacing: 0.03em;
    }
    .char-tile {
      width: 64px;
      height: 72px;
      border-radius: 14px;
      background: #1e293b;
      border: 2px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(26px, 8vw, 36px);
      font-weight: 800;
      color: #f1f5f9;
      transition: all 0.2s;
    }
    .char-tile.highlighted {
      background: rgba(236,72,153,0.18);
      border-color: #ec4899;
      color: #f9a8d4;
      transform: scale(1.06);
      box-shadow: 0 0 16px rgba(236,72,153,0.3);
    }
    .char-tile.dimmed {
      opacity: 0.25;
    }
    .char-num.dimmed { color: #475569; }

    .hint-notice {
      font-size: 14px;
      font-weight: 700;
      color: #f9a8d4;
      text-align: center;
      padding: 12px 16px;
      background: rgba(236,72,153,0.1);
      border-radius: 10px;
      border: 1px solid rgba(236,72,153,0.25);
      line-height: 1.6;
    }

    /* ── 버튼 영역 ── */
    .action-area {
      padding: 12px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .draw-btn {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #ec4899, #f43f5e);
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(236,72,153,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(236,72,153,0.55);
    }
    .draw-btn:active { transform: scale(0.97); }

    .hint-btn-row {
      display: flex;
      gap: 8px;
    }
    .hint-action-btn {
      flex: 1;
      padding: 14px 8px;
      border-radius: 14px;
      border: 2px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .hint-action-btn:hover { border-color: #ec4899; color: #f9a8d4; background: rgba(236,72,153,0.08); }
    .hint-action-btn:active { transform: scale(0.97); }

    .clear-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #334155;
      background: transparent;
      color: #64748b;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: none;
    }
    .clear-btn.visible { display: block; }
    .clear-btn:hover { border-color: #475569; color: #94a3b8; }
    .clear-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="tool-header">
  <a href="iguseong.html" class="back-link">← 게임 설명으로 돌아가기</a>
</div>

<!-- 컨트롤 -->
<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">참가 인원 (글자 수)</span>
    <div class="btn-group" id="lenGroup">
      <button class="seg-btn active" data-len="4">4명 (4글자)</button>
      <button class="seg-btn" data-len="5">5명 (5글자)</button>
      <button class="seg-btn" data-len="6">6명 (6글자)</button>
    </div>
    <span class="person-badge">필요 인원: <span id="personCount">4</span>명</span>
    <p class="ctrl-note">고른 인원에 맞는 글자 수만 출제돼요. 게임 중 사람 수가 바뀌지 않아요.</p>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">난이도</span>
    <div class="btn-group" id="levelGroup">
      <button class="seg-btn active" data-level="전체">전체</button>
      <button class="seg-btn" data-level="쉬움">쉬움</button>
      <button class="seg-btn" data-level="보통">보통</button>
      <button class="seg-btn" data-level="어려움">어려움</button>
    </div>
  </div>
</div>

<!-- 단어 디스플레이 -->
<div class="display-area" id="displayArea">
  <div class="placeholder" id="placeholder">
    <span class="icon">🎤</span>
    <span class="msg">버튼을 눌러 단어를 뽑아요!</span>
  </div>
  <div class="word-display" id="wordDisplay" style="display:none;"></div>
  <div class="hint-notice" id="hintNotice" style="display:none;"></div>
</div>

<!-- 액션 버튼 -->
<div class="action-area">
  <button class="draw-btn" id="drawBtn">🎤 단어 뽑기</button>
  <div class="hint-btn-row">
    <button class="hint-action-btn" id="hint2Btn">🙈 힌트: 2명만</button>
    <button class="hint-action-btn" id="hint3Btn">🙈 힌트: 3명만</button>
  </div>
  <button class="clear-btn" id="clearBtn">↩ 전체 다시 보기</button>
</div>

<script>
const WORDS = [
  // ── 4글자 ──
  {word:"횡단보도", len:4, level:"쉬움"},
  {word:"손톱깎이", len:4, level:"쉬움"},
  {word:"연필깎이", len:4, level:"쉬움"},
  {word:"김치찌개", len:4, level:"쉬움"},
  {word:"된장찌개", len:4, level:"쉬움"},
  {word:"비빔국수", len:4, level:"쉬움"},
  {word:"바람개비", len:4, level:"쉬움"},
  {word:"무지개떡", len:4, level:"쉬움"},
  {word:"호랑나비", len:4, level:"쉬움"},
  {word:"무당벌레", len:4, level:"쉬움"},
  {word:"사슴벌레", len:4, level:"쉬움"},
  {word:"고슴도치", len:4, level:"쉬움"},
  {word:"해바라기", len:4, level:"쉬움"},
  {word:"코스모스", len:4, level:"쉬움"},
  {word:"강아지풀", len:4, level:"쉬움"},

  {word:"수학여행", len:4, level:"보통"},
  {word:"졸업여행", len:4, level:"보통"},
  {word:"졸업사진", len:4, level:"보통"},
  {word:"화산폭발", len:4, level:"보통"},
  {word:"단풍놀이", len:4, level:"보통"},
  {word:"불꽃놀이", len:4, level:"보통"},
  {word:"봄나들이", len:4, level:"보통"},
  {word:"소방대원", len:4, level:"보통"},
  {word:"등대지기", len:4, level:"보통"},
  {word:"갯벌체험", len:4, level:"보통"},
  {word:"운동경기", len:4, level:"보통"},
  {word:"가족여행", len:4, level:"보통"},

  {word:"일석이조", len:4, level:"어려움"},
  {word:"십중팔구", len:4, level:"어려움"},
  {word:"우왕좌왕", len:4, level:"어려움"},
  {word:"동분서주", len:4, level:"어려움"},
  {word:"이심전심", len:4, level:"어려움"},
  {word:"천고마비", len:4, level:"어려움"},
  {word:"죽마고우", len:4, level:"어려움"},
  {word:"청출어람", len:4, level:"어려움"},
  {word:"작심삼일", len:4, level:"어려움"},
  {word:"새옹지마", len:4, level:"어려움"},
  {word:"어부지리", len:4, level:"어려움"},
  {word:"금상첨화", len:4, level:"어려움"},
  {word:"권선징악", len:4, level:"어려움"},
  {word:"화룡점정", len:4, level:"어려움"},
  {word:"다다익선", len:4, level:"어려움"},
  {word:"유비무환", len:4, level:"어려움"},
  {word:"대기만성", len:4, level:"어려움"},
  {word:"동고동락", len:4, level:"어려움"},
  {word:"견물생심", len:4, level:"어려움"},
  {word:"일사천리", len:4, level:"어려움"},

  // ── 5글자 ──
  {word:"전자레인지", len:5, level:"쉬움"},
  {word:"자동판매기", len:5, level:"쉬움"},
  {word:"계란후라이", len:5, level:"쉬움"},
  {word:"김치볶음밥", len:5, level:"쉬움"},
  {word:"소고기국밥", len:5, level:"쉬움"},
  {word:"세발자전거", len:5, level:"쉬움"},
  {word:"칠판지우개", len:5, level:"쉬움"},
  {word:"종이비행기", len:5, level:"쉬움"},
  {word:"색종이접기", len:5, level:"쉬움"},
  {word:"고무줄놀이", len:5, level:"쉬움"},

  {word:"우주비행사", len:5, level:"보통"},
  {word:"국악연주회", len:5, level:"보통"},
  {word:"미술전시회", len:5, level:"보통"},
  {word:"과학실험실", len:5, level:"보통"},
  {word:"종합운동장", len:5, level:"보통"},
  {word:"야구경기장", len:5, level:"보통"},
  {word:"국립도서관", len:5, level:"보통"},

  {word:"상대성이론", len:5, level:"어려움"},
  {word:"헌법재판소", len:5, level:"어려움"},
  {word:"광합성작용", len:5, level:"어려움"},
  {word:"원자력발전", len:5, level:"어려움"},
  {word:"유전자조작", len:5, level:"어려움"},
  {word:"지구온난화", len:5, level:"어려움"},

  // ── 6글자 ──
  {word:"어린이놀이터", len:6, level:"쉬움"},
  {word:"비눗방울놀이", len:6, level:"쉬움"},
  {word:"종이접기놀이", len:6, level:"쉬움"},
  {word:"술래잡기놀이", len:6, level:"쉬움"},
  {word:"숨바꼭질놀이", len:6, level:"쉬움"},
  {word:"풍선불기놀이", len:6, level:"쉬움"},

  {word:"어린이대공원", len:6, level:"보통"},
  {word:"자연사박물관", len:6, level:"보통"},
  {word:"시민체육센터", len:6, level:"보통"},
  {word:"전통문화체험", len:6, level:"보통"},
  {word:"종합복지센터", len:6, level:"보통"},

  {word:"인공지능기술", len:6, level:"어려움"},
  {word:"양자역학이론", len:6, level:"어려움"},
  {word:"블록체인기술", len:6, level:"어려움"},
  {word:"가상현실세계", len:6, level:"어려움"},
  {word:"빅데이터분석", len:6, level:"어려움"},
  {word:"면역체계반응", len:6, level:"어려움"},
];

let S = {
  len: 4,
  level: '전체',
  currentWord: null,
  highlightedIdx: [],
  hintActive: false,
};

/* ── 인원(글자 수) 선택 ── */
document.getElementById('lenGroup').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  S.len = parseInt(btn.dataset.len);
  document.getElementById('personCount').textContent = S.len;
  setActive('lenGroup', btn);
  resetDisplay();
});

/* ── 난이도 선택 ── */
document.getElementById('levelGroup').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  S.level = btn.dataset.level;
  setActive('levelGroup', btn);
});

function setActive(groupId, activeBtn) {
  document.getElementById(groupId).querySelectorAll('.seg-btn').forEach(b => {
    b.classList.toggle('active', b === activeBtn);
  });
}

/* ── 단어 뽑기 ── */
document.getElementById('drawBtn').addEventListener('click', drawWord);

function drawWord() {
  const pool = WORDS.filter(w => w.len === S.len && (S.level === '전체' || w.level === S.level));
  if (pool.length === 0) {
    alert('해당 조건에 맞는 단어가 없어요. 난이도를 바꿔보세요.');
    return;
  }
  let picked = pool[Math.floor(Math.random() * pool.length)];
  if (pool.length > 1 && S.currentWord && picked.word === S.currentWord.word) {
    const others = pool.filter(w => w.word !== S.currentWord.word);
    picked = others[Math.floor(Math.random() * others.length)];
  }
  S.currentWord = picked;
  S.hintActive = false;
  S.highlightedIdx = [];
  renderWord();
}

/* ── 힌트 버튼 ── */
document.getElementById('hint2Btn').addEventListener('click', () => applyHint(2));
document.getElementById('hint3Btn').addEventListener('click', () => applyHint(3));

function applyHint(count) {
  if (!S.currentWord) {
    alert('먼저 단어를 뽑아주세요!');
    return;
  }
  const total = S.currentWord.len;
  const n = Math.min(count, total);
  const indices = [...Array(total).keys()];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  S.highlightedIdx = indices.slice(0, n).sort((a, b) => a - b);
  S.hintActive = true;
  renderWord();
}

/* ── 전체 다시 보기 ── */
document.getElementById('clearBtn').addEventListener('click', () => {
  S.hintActive = false;
  S.highlightedIdx = [];
  renderWord();
});

/* ── 렌더링 ── */
function renderWord() {
  if (!S.currentWord) return;

  document.getElementById('placeholder').style.display = 'none';
  const wordDisplay = document.getElementById('wordDisplay');
  wordDisplay.style.display = 'flex';

  const chars = [...S.currentWord.word];

  wordDisplay.innerHTML = chars.map((ch, i) => {
    let tileClass = 'char-tile';
    let numClass = 'char-num';
    if (S.hintActive) {
      if (S.highlightedIdx.includes(i)) {
        tileClass += ' highlighted';
      } else {
        tileClass += ' dimmed';
        numClass += ' dimmed';
      }
    }
    return `<div class="char-box">
      <span class="${numClass}">${i + 1}번</span>
      <div class="${tileClass}">${ch}</div>
    </div>`;
  }).join('');

  const hintNotice = document.getElementById('hintNotice');
  const clearBtn = document.getElementById('clearBtn');

  if (S.hintActive) {
    const nums = S.highlightedIdx.map(i => `${i + 1}번`).join(', ');
    hintNotice.textContent = `🔔 이 번호 사람들만 다시 외쳐주세요: ${nums}`;
    hintNotice.style.display = 'block';
    clearBtn.classList.add('visible');
  } else {
    hintNotice.style.display = 'none';
    clearBtn.classList.remove('visible');
  }
}

function resetDisplay() {
  S.currentWord = null;
  S.hintActive = false;
  S.highlightedIdx = [];
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('wordDisplay').style.display = 'none';
  document.getElementById('hintNotice').style.display = 'none';
  document.getElementById('clearBtn').classList.remove('visible');
}
</script>
</body>
</html>
