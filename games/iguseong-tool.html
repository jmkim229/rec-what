<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="이구동성 진행자 도구. 4·5·6글자 단어를 랜덤으로 뽑아 글자별로 표시해드려요.">
  <title>🎤 이구동성 도구 | 레크 뭐하지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── 헤더 ── */
    .tool-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .back-link {
      color: #ec4899;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-link:hover { color: #f9a8d4; }

    /* ── 컨트롤 영역 ── */
    .controls {
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }
    .ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ctrl-label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .btn-group {
      display: flex;
      gap: 6px;
    }
    .seg-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      border: 2px solid #1e293b;
      background: #1e293b;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.15s;
    }
    .seg-btn.active {
      border-color: #ec4899;
      background: rgba(236,72,153,0.15);
      color: #f9a8d4;
    }

    /* ── 단어 디스플레이 ── */
    .display-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      gap: 16px;
    }
    .placeholder {
      text-align: center;
      color: #334155;
    }
    .placeholder .icon {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
    }
    .placeholder .msg {
      font-size: 15px;
      font-weight: 600;
    }

    .word-display {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .char-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 60px;
    }
    .char-num {
      font-size: 11px;
      font-weight: 700;
      color: #ec4899;
      letter-spacing: 0.03em;
    }
    .char-tile {
      width: 64px;
      height: 72px;
      border-radius: 14px;
      background: #1e293b;
      border: 2px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(26px, 8vw, 36px);
      font-weight: 800;
      color: #f1f5f9;
      transition: all 0.2s;
    }
    .char-tile.hidden {
      background: #0f172a;
      border-color: #1e293b;
      color: #475569;
      font-size: 28px;
    }
    .char-tile.revealed {
      background: rgba(236,72,153,0.12);
      border-color: #ec4899;
      color: #f9a8d4;
    }

    .hint-notice {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      padding: 10px 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border-left: 3px solid #ec4899;
      line-height: 1.6;
    }

    /* ── 버튼 영역 ── */
    .action-area {
      padding: 12px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .draw-btn {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #ec4899, #f43f5e);
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(236,72,153,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .draw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(236,72,153,0.55);
    }
    .draw-btn:active { transform: scale(0.97); }

    .reveal-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid rgba(236,72,153,0.35);
      background: rgba(236,72,153,0.08);
      color: #f9a8d4;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: none;
    }
    .reveal-btn.visible { display: block; }
    .reveal-btn:hover { background: rgba(236,72,153,0.18); }
    .reveal-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="tool-header">
  <a href="iguseong.html" class="back-link">← 게임 설명으로 돌아가기</a>
</div>

<!-- 컨트롤 -->
<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">글자 수</span>
    <div class="btn-group" id="lenGroup">
      <button class="seg-btn active" data-len="4">4글자</button>
      <button class="seg-btn" data-len="5">5글자</button>
      <button class="seg-btn" data-len="6">6글자</button>
    </div>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">카테고리</span>
    <div class="btn-group" id="catGroup">
      <button class="seg-btn active" data-cat="전체">전체</button>
      <button class="seg-btn" data-cat="동물">동물</button>
      <button class="seg-btn" data-cat="음식">음식</button>
      <button class="seg-btn" data-cat="일상어">일상어</button>
    </div>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">힌트 모드</span>
    <div class="btn-group" id="hintGroup">
      <button class="seg-btn active" data-hint="0">없음</button>
      <button class="seg-btn" data-hint="2">2명만</button>
      <button class="seg-btn" data-hint="3">3명만</button>
    </div>
  </div>
</div>

<!-- 단어 디스플레이 -->
<div class="display-area" id="displayArea">
  <div class="placeholder" id="placeholder">
    <span class="icon">🎤</span>
    <span class="msg">버튼을 눌러 단어를 뽑아요!</span>
  </div>
  <div class="word-display" id="wordDisplay" style="display:none;"></div>
  <div class="hint-notice" id="hintNotice" style="display:none;"></div>
</div>

<!-- 액션 버튼 -->
<div class="action-area">
  <button class="draw-btn" id="drawBtn">🎤 단어 뽑기</button>
  <button class="reveal-btn" id="revealBtn">🔍 정답 보기</button>
</div>

<script>
const WORDS = [
  // 4글자 일상어
  {word:"사랑해요", len:4, cat:"일상어"},
  {word:"대한민국", len:4, cat:"일상어"},
  {word:"가나다라", len:4, cat:"일상어"},
  {word:"행복하다", len:4, cat:"일상어"},
  {word:"즐거워요", len:4, cat:"일상어"},
  {word:"감사해요", len:4, cat:"일상어"},
  {word:"파이팅해", len:4, cat:"일상어"},
  {word:"잘지내요", len:4, cat:"일상어"},
  {word:"힘내세요", len:4, cat:"일상어"},
  {word:"좋아해요", len:4, cat:"일상어"},
  // 4글자 동물
  {word:"무당벌레", len:4, cat:"동물"},
  {word:"고슴도치", len:4, cat:"동물"},
  {word:"반딧불이", len:4, cat:"동물"},
  {word:"호랑나비", len:4, cat:"동물"},
  // 4글자 음식
  {word:"김치찌개", len:4, cat:"음식"},
  {word:"된장찌개", len:4, cat:"음식"},
  {word:"순대국밥", len:4, cat:"음식"},
  {word:"돼지국밥", len:4, cat:"음식"},
  {word:"오징어회", len:4, cat:"음식"},
  {word:"비빔냉면", len:4, cat:"음식"},
  // 5글자 일상어
  {word:"생일축하해", len:5, cat:"일상어"},
  {word:"즐거운하루", len:5, cat:"일상어"},
  {word:"친구사랑해", len:5, cat:"일상어"},
  {word:"힘차게달려", len:5, cat:"일상어"},
  {word:"하나둘셋넷", len:5, cat:"일상어"},
  // 5글자 동물
  {word:"장수풍뎅이", len:5, cat:"동물"},
  {word:"바다거북이", len:5, cat:"동물"},
  {word:"황금독수리", len:5, cat:"동물"},
  {word:"무지개송어", len:5, cat:"동물"},
  // 5글자 음식
  {word:"닭갈비볶음", len:5, cat:"음식"},
  {word:"계란후라이", len:5, cat:"음식"},
  {word:"쌀국수요리", len:5, cat:"음식"},
  // 6글자 일상어
  {word:"대한민국만세", len:6, cat:"일상어"},
  {word:"행복한우리들", len:6, cat:"일상어"},
  {word:"모두함께해요", len:6, cat:"일상어"},
  {word:"오늘도파이팅", len:6, cat:"일상어"},
  // 6글자 동물
  {word:"귀여운다람쥐", len:6, cat:"동물"},
  {word:"아기공룡둘리", len:6, cat:"동물"},
  // 6글자 음식
  {word:"맛있는밥먹자", len:6, cat:"음식"},
  {word:"맛있게드세요", len:6, cat:"음식"},
];

let S = {
  len: 4,
  cat: '전체',
  hint: 0,
  currentWord: null,
  visibleIdx: [],
  revealed: false,
};

/* ── 컨트롤 이벤트 ── */
document.getElementById('lenGroup').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  S.len = parseInt(btn.dataset.len);
  setActive('lenGroup', btn);
  resetDisplay();
});

document.getElementById('catGroup').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  S.cat = btn.dataset.cat;
  setActive('catGroup', btn);
  resetDisplay();
});

document.getElementById('hintGroup').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  S.hint = parseInt(btn.dataset.hint);
  setActive('hintGroup', btn);
  if (S.currentWord) renderWord();
});

function setActive(groupId, activeBtn) {
  document.getElementById(groupId).querySelectorAll('.seg-btn').forEach(b => {
    b.classList.toggle('active', b === activeBtn);
  });
}

/* ── 단어 뽑기 ── */
document.getElementById('drawBtn').addEventListener('click', drawWord);

function drawWord() {
  const pool = WORDS.filter(w => w.len === S.len && (S.cat === '전체' || w.cat === S.cat));
  if (pool.length === 0) {
    alert('해당 조건에 맞는 단어가 없어요. 글자 수나 카테고리를 바꿔보세요.');
    return;
  }
  // 같은 단어 연속 방지 (pool이 2개 이상일 때)
  let picked = pool[Math.floor(Math.random() * pool.length)];
  if (pool.length > 1 && S.currentWord && picked.word === S.currentWord.word) {
    const others = pool.filter(w => w.word !== S.currentWord.word);
    picked = others[Math.floor(Math.random() * others.length)];
  }
  S.currentWord = picked;
  S.revealed = false;
  pickVisibleIdx();
  renderWord();
}

function pickVisibleIdx() {
  if (S.hint === 0) { S.visibleIdx = []; return; }
  const total = S.currentWord.len;
  const count = Math.min(S.hint, total);
  const indices = [...Array(total).keys()];
  // Fisher-Yates shuffle to pick random indices
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  S.visibleIdx = indices.slice(0, count);
}

/* ── 정답 보기 ── */
document.getElementById('revealBtn').addEventListener('click', () => {
  S.revealed = true;
  renderWord();
});

/* ── 렌더링 ── */
function renderWord() {
  if (!S.currentWord) return;

  document.getElementById('placeholder').style.display = 'none';
  const wordDisplay = document.getElementById('wordDisplay');
  wordDisplay.style.display = 'flex';

  const chars = [...S.currentWord.word];
  const isHintMode = S.hint > 0;
  const revealAll = S.revealed || !isHintMode;

  wordDisplay.innerHTML = chars.map((ch, i) => {
    const isVisible = revealAll || S.visibleIdx.includes(i);
    const tileClass = isVisible
      ? (isHintMode && !S.revealed ? 'char-tile revealed' : 'char-tile')
      : 'char-tile hidden';
    return `<div class="char-box">
      <span class="char-num">${i + 1}번</span>
      <div class="${tileClass}">${isVisible ? ch : '?'}</div>
    </div>`;
  }).join('');

  const hintNotice = document.getElementById('hintNotice');
  const revealBtn = document.getElementById('revealBtn');

  if (isHintMode && !S.revealed) {
    const nums = S.visibleIdx.map(i => `${i + 1}번`).sort((a, b) => parseInt(a) - parseInt(b)).join(', ');
    hintNotice.textContent = `👆 ${nums} 사람만 외치게 하세요!`;
    hintNotice.style.display = 'block';
    revealBtn.classList.add('visible');
  } else {
    hintNotice.style.display = 'none';
    revealBtn.classList.remove('visible');
  }
}

function resetDisplay() {
  S.currentWord = null;
  S.revealed = false;
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('wordDisplay').style.display = 'none';
  document.getElementById('hintNotice').style.display = 'none';
  document.getElementById('revealBtn').classList.remove('visible');
}
</script>
</body>
</html>
