<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>릴레이 미션 타이머 - 레크 뭐하지?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(17,17,17,0.92);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .top-bar a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .top-bar a:active { color: #fff; }

    /* Screens */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 72px 20px 40px;
      min-height: 100vh;
    }
    .screen.active { display: flex; }

    /* ── Screen 1: Setup ── */
    #screen1 { justify-content: flex-start; }

    .screen1-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 28px;
      color: #fff;
    }

    .preset-section-label {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
      align-self: flex-start;
      width: 100%;
      max-width: 400px;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 24px;
    }
    .preset-btn {
      background: #222;
      border: 2px solid #333;
      border-radius: 12px;
      color: #ccc;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 4px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      text-align: center;
    }
    .preset-btn:hover { background: #2a2a2a; border-color: #555; color: #fff; }
    .preset-btn.selected {
      background: #FF6B35;
      border-color: #FF6B35;
      color: #fff;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }
    .divider-line { flex: 1; height: 1px; background: #333; }
    .divider-text { color: #555; font-size: 13px; white-space: nowrap; }

    .manual-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 32px;
    }
    .manual-field {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .manual-field input {
      width: 64px;
      background: #222;
      border: 2px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      padding: 10px 4px;
      outline: none;
      -moz-appearance: textfield;
    }
    .manual-field input::-webkit-outer-spin-button,
    .manual-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .manual-field input:focus { border-color: #FF6B35; }
    .manual-field label { color: #888; font-size: 14px; }
    .manual-sep { color: #555; font-size: 20px; font-weight: 700; }

    .start-btn {
      width: 100%;
      max-width: 400px;
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      padding: 20px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,53,0.4);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .start-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(255,107,53,0.3);
    }

    /* ── Screen 2: Timer ── */
    #screen2 {
      justify-content: center;
      background: #111;
      transition: background 0.3s;
    }
    #screen2.warn-yellow { background: #3a2800; }
    #screen2.warn-red { background: #2a0000; }

    .timer-display {
      font-size: clamp(80px, 22vw, 140px);
      font-weight: 900;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      color: #fff;
      text-align: center;
      line-height: 1;
      margin-bottom: 12px;
      transition: color 0.3s;
    }
    #screen2.warn-yellow .timer-display { color: #FFD700; }
    #screen2.warn-red .timer-display { color: #FF4040; }

    .timer-label {
      font-size: 15px;
      color: #666;
      text-align: center;
      margin-bottom: 48px;
    }

    .ctrl-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }
    .ctrl-btn {
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 24px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    .ctrl-btn:active { transform: scale(0.95); }

    #pauseBtn {
      flex: 2;
      background: #FF6B35;
      color: #fff;
      font-size: 18px;
    }
    #resetBtn {
      flex: 1;
      background: #333;
      color: #aaa;
    }
    #stopBtn {
      flex: 1;
      background: #333;
      color: #aaa;
    }

    /* Flash overlay */
    .flash-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    .flash-overlay.flash-yellow { background: #FFD700; animation: flashAnim 0.5s ease-out; }
    .flash-overlay.flash-red    { background: #FF2020; animation: flashAnim 0.5s ease-out; }
    @keyframes flashAnim {
      0%   { opacity: 0.55; }
      100% { opacity: 0; }
    }

    /* ── Screen 3: End ── */
    #screen3 { justify-content: center; }

    .end-icon {
      font-size: 72px;
      margin-bottom: 16px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .end-title {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 8px;
      text-align: center;
    }
    .end-sub {
      font-size: 16px;
      color: #888;
      text-align: center;
      margin-bottom: 48px;
    }
    .end-btn-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }
    .end-btn-primary {
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      padding: 18px;
      cursor: pointer;
    }
    .end-btn-secondary {
      background: #222;
      border: 2px solid #333;
      border-radius: 14px;
      color: #aaa;
      font-size: 16px;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }
  </style>
  <!-- Open Graph / SNS 공유 -->

  <meta property="og:image" content="https://rec-what.vercel.app/og-image.png">
  <meta property="og:locale" content="ko_KR">

<body>

  <div class="top-bar">
    <a href="team-relay.html" id="backLink">← 게임 설명으로 돌아가기</a>
  </div>

  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- Screen 1: Setup -->
  <div class="screen active" id="screen1">
    <div class="screen1-title">⏱️ 타이머 설정</div>

    <div style="background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;margin-bottom:20px;border-left:3px solid #34d399;">
      <p style="font-size:13px;color:#94a3b8;line-height:1.75;margin:0;">이 도구는 <strong style="color:#e2e8f0;">팀 릴레이 게임</strong>의 라운드 타이머입니다. 제한 시간 안에 미션을 완수하고 다음 팀원에게 바통을 넘기세요. 타이머가 끝나면 효과음으로 알려줍니다. 게임 방법은 <a href="team-relay.html" style="color:#6ee7b7;">팀 릴레이 게임 페이지</a>에서 확인하세요.</p>
    </div>

    <div class="preset-section-label">빠른 선택</div>
    <div class="preset-grid">
      <button class="preset-btn" data-sec="60">1분</button>
      <button class="preset-btn" data-sec="90">1분 30초</button>
      <button class="preset-btn" data-sec="120">2분</button>
      <button class="preset-btn" data-sec="180">3분</button>
      <button class="preset-btn" data-sec="300">5분</button>
      <button class="preset-btn" data-sec="600">10분</button>
      <button class="preset-btn" data-sec="900">15분</button>
      <button class="preset-btn" data-sec="1200">20분</button>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">또는 직접 입력</div>
      <div class="divider-line"></div>
    </div>

    <div class="manual-row">
      <div class="manual-field">
        <input type="number" id="manualMin" min="0" max="99" placeholder="0">
        <label>분</label>
      </div>
      <div class="manual-sep">:</div>
      <div class="manual-field">
        <input type="number" id="manualSec" min="0" max="59" placeholder="0">
        <label>초</label>
      </div>
    </div>

    <button class="start-btn" id="startBtn">⏱️ 타이머 시작</button>
  </div>

  <!-- Screen 2: Timer -->
  <div class="screen" id="screen2">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-label" id="timerLabel">진행 중</div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="pauseBtn">⏸️ 일시정지</button>
      <button class="ctrl-btn" id="resetBtn">🔄 처음으로</button>
      <button class="ctrl-btn" id="stopBtn">⏹️ 종료</button>
    </div>
  </div>

  <!-- Screen 3: End -->
  <div class="screen" id="screen3">
    <div class="end-icon">⏰</div>
    <div class="end-title">시간 종료!</div>
    <div class="end-sub">수고하셨습니다</div>
    <div class="end-btn-row">
      <button class="end-btn-primary" id="restartBtn">🔄 다시 설정하기</button>
      <a href="team-relay.html" class="end-btn-secondary">← 게임 설명으로</a>
    </div>
  </div>

  <script>
    let totalSeconds = 0;
    let remaining = 0;
    let timerInterval = null;
    let paused = false;
    let warn30done = false;
    let warn10done = false;
    let audioCtx = null;

    const screen1 = document.getElementById('screen1');
    const screen2 = document.getElementById('screen2');
    const screen3 = document.getElementById('screen3');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerLabel = document.getElementById('timerLabel');
    const pauseBtn = document.getElementById('pauseBtn');
    const flashOverlay = document.getElementById('flashOverlay');
    const manualMin = document.getElementById('manualMin');
    const manualSec = document.getElementById('manualSec');

    // Back link: confirm if timer active
    document.getElementById('backLink').addEventListener('click', function(e) {
      if (screen2.classList.contains('active') && !paused) {
        if (!confirm('타이머가 진행 중입니다. 게임 설명 페이지로 이동할까요?')) {
          e.preventDefault();
        }
      }
    });

    // Preset buttons
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        const sec = parseInt(this.dataset.sec);
        manualMin.value = Math.floor(sec / 60);
        manualSec.value = sec % 60;
      });
    });

    // Manual input clears preset selection
    [manualMin, manualSec].forEach(inp => {
      inp.addEventListener('input', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
      });
    });

    // Start
    document.getElementById('startBtn').addEventListener('click', () => {
      const m = parseInt(manualMin.value) || 0;
      const s = parseInt(manualSec.value) || 0;
      totalSeconds = m * 60 + s;
      if (totalSeconds <= 0) {
        alert('시간을 설정해주세요.');
        return;
      }
      remaining = totalSeconds;
      warn30done = false;
      warn10done = false;
      paused = false;
      showScreen(screen2);
      screen2.classList.remove('warn-yellow', 'warn-red');
      updateDisplay();
      timerLabel.textContent = '진행 중';
      pauseBtn.textContent = '⏸️ 일시정지';
      startInterval();
    });

    function startInterval() {
      clearInterval(timerInterval);
      timerInterval = setInterval(tick, 1000);
    }

    function tick() {
      if (paused) return;
      remaining--;
      updateDisplay();
      checkWarnings();
      if (remaining <= 0) {
        clearInterval(timerInterval);
        playEndSound();
        setTimeout(() => showScreen(screen3), 600);
      }
    }

    function updateDisplay() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      timerDisplay.textContent =
        String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function checkWarnings() {
      if (!warn30done && remaining === 30 && totalSeconds > 30) {
        warn30done = true;
        screen2.classList.remove('warn-red');
        screen2.classList.add('warn-yellow');
        triggerFlash('flash-yellow');
        timerLabel.textContent = '⚠️ 30초 남았어요!';
      }
      if (!warn10done && remaining === 10) {
        warn10done = true;
        screen2.classList.remove('warn-yellow');
        screen2.classList.add('warn-red');
        triggerFlash('flash-red');
        timerLabel.textContent = '🔴 10초 남았어요!';
      }
    }

    function triggerFlash(cls) {
      flashOverlay.className = 'flash-overlay ' + cls;
      flashOverlay.addEventListener('animationend', () => {
        flashOverlay.className = 'flash-overlay';
      }, { once: true });
    }

    // Pause / resume
    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? '▶️ 재개' : '⏸️ 일시정지';
      timerLabel.textContent = paused ? '일시정지됨' : (remaining <= 10 ? '🔴 10초 남았어요!' : remaining <= 30 ? '⚠️ 30초 남았어요!' : '진행 중');
    });

    // Reset → back to screen1 preset
    document.getElementById('resetBtn').addEventListener('click', () => {
      clearInterval(timerInterval);
      showScreen(screen1);
    });

    // Stop → go to end screen
    document.getElementById('stopBtn').addEventListener('click', () => {
      if (!confirm('타이머를 종료할까요?')) return;
      clearInterval(timerInterval);
      showScreen(screen3);
    });

    // Restart
    document.getElementById('restartBtn').addEventListener('click', () => {
      showScreen(screen1);
    });

    function showScreen(target) {
      [screen1, screen2, screen3].forEach(s => s.classList.remove('active'));
      target.classList.add('active');
    }

    function playEndSound() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const freqs = [880, 660, 440];
        freqs.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const t = audioCtx.currentTime + i * 0.22;
          gain.gain.setValueAtTime(0.5, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          osc.start(t);
          osc.stop(t + 0.35);
        });
      } catch(e) {}
    }
  </script>
</body>
</html>
