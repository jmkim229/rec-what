  <title>🏐 풍선 배구 점수판 | 레크 뭐하지?</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; }

    /* ══════════════════════════════
       화면 1 — 설정
    ══════════════════════════════ */
    #screen-settings { min-height: 100vh; background: #0f172a; }
    .tool-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .back-link {
      color: #7dd3fc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-link:hover { color: #e0f2fe; }

    .settings-body { flex: 1; overflow-y: auto; padding: 24px 18px 48px; }
    .settings-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .settings-sub { font-size: 13px; color: #94a3b8; margin-bottom: 28px; }
    .setting-group { margin-bottom: 28px; }
    .setting-label {
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .opt-row { display: flex; gap: 8px; }
    .opt-btn {
      flex: 1;
      padding: 14px 6px;
      border-radius: 14px;
      border: 2px solid #1e293b;
      background: #1e293b;
      color: #94a3b8;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-align: center;
    }
    .opt-btn.selected {
      border-color: #0ea5e9;
      background: rgba(14,165,233,0.14);
      color: #7dd3fc;
    }

    .start-btn {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(14,165,233,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(14,165,233,0.55); }

    /* ══════════════════════════════
       화면 2 — 점수판
    ══════════════════════════════ */
    #screen-play { position: fixed; inset: 0; background: #0f172a; }
    #screen-play.active { display: flex; flex-direction: column; }

    .play-top {
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .play-back-link {
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      color: #64748b;
      transition: color 0.15s;
    }
    .play-back-link:hover { color: #cbd5e1; }
    .match-info {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
    }

    /* 세트 스코어 */
    .set-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 10px 0 8px;
    }
    .set-score {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .set-score .blue { color: #60a5fa; }
    .set-score .red  { color: #f87171; }
    .set-label { font-size: 12px; color: #64748b; font-weight: 700; }

    /* 코트 */
    .court {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
      position: relative;
    }
    .side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: filter 0.1s;
      position: relative;
      padding: 12px;
    }
    .side:active { filter: brightness(1.15); }
    .side-blue { background: linear-gradient(160deg, #1d4ed8, #3b82f6); margin: 8px 0 8px 8px; border-radius: 22px; }
    .side-red  { background: linear-gradient(160deg, #b91c1c, #ef4444); margin: 8px 8px 8px 0; border-radius: 22px; }

    /* 가운데 네트 */
    .net {
      width: 10px;
      flex-shrink: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.35) 0 10px,
        transparent 10px 20px
      );
      margin: 20px 4px;
      border-radius: 4px;
    }

    .team-name {
      font-size: clamp(15px, 4vw, 20px);
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .serve-ball {
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .serve-ball.on { opacity: 1; }

    .score {
      font-size: clamp(72px, 26vw, 150px);
      font-weight: 800;
      line-height: 1;
      color: white;
      text-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }
    .score.pop { animation: scorePop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes scorePop {
      0%   { transform: scale(0.7); }
      60%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .tap-hint {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
    }

    /* 하단 컨트롤 */
    .play-bottom {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      padding: 8px 16px calc(16px + env(safe-area-inset-bottom));
    }
    .ctrl-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #cbd5e1;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.16); }
    .ctrl-btn:disabled { opacity: 0.4; cursor: default; }

    /* 오버레이 (세트/경기 종료) */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 24px;
    }
    .overlay.show { display: flex; }
    .overlay-card {
      background: #1e293b;
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .overlay-emoji { font-size: 56px; display: block; margin-bottom: 12px; }
    .overlay-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .overlay-sub { font-size: 14px; color: #94a3b8; margin-bottom: 24px; line-height: 1.6; }
    .overlay-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: white;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
    }
    .overlay-btn.ghost {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: #cbd5e1;
      font-weight: 700;
      margin-bottom: 0;
    }
  </style>
</head>
<body>

<!-- ══ 화면 1: 설정 ══ -->
<div id="screen-settings" class="screen active">
  <div class="tool-header">
    <a href="balloon-volleyball.html" class="back-link">← 게임 설명으로 돌아가기</a>
  </div>
  <div class="settings-body">
    <div class="settings-title">🏐 풍선 배구 점수판</div>
    <div class="settings-sub">코트를 탭하면 득점! 세트와 서브까지 자동 관리</div>

    <div style="background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;margin-bottom:24px;border-left:3px solid #38bdf8;">
      <p style="font-size:13px;color:#94a3b8;line-height:1.75;margin:0;">
        <strong style="color:#e2e8f0;">핵심 규칙 요약</strong> — ① 팀당 최대 3번 터치 후 넘기기
        ② 한 사람이 두 번 이상 치기 금지 ③ 바닥에 닿거나 네트 아래로 가면 실점.
        자세한 방법은 <a href="balloon-volleyball.html" style="color:#7dd3fc;">풍선 배구 페이지</a>에서 확인하세요.
      </p>
    </div>

    <div class="setting-group">
      <div class="setting-label">세트 승리 점수</div>
      <div class="opt-row" id="target-row">
        <button class="opt-btn" data-target="7">7점</button>
        <button class="opt-btn selected" data-target="11">11점</button>
        <button class="opt-btn" data-target="15">15점</button>
        <button class="opt-btn" data-target="21">21점</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label">세트 수</div>
      <div class="opt-row" id="sets-row">
        <button class="opt-btn" data-sets="1">단판</button>
        <button class="opt-btn selected" data-sets="3">3판 2선승</button>
        <button class="opt-btn" data-sets="5">5판 3선승</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label">듀스 (동점 근처면 2점 차로 승리)</div>
      <div class="opt-row" id="deuce-row">
        <button class="opt-btn selected" data-deuce="on">듀스 있음</button>
        <button class="opt-btn" data-deuce="off">듀스 없음</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn">🎬 경기 시작</button>
  </div>
</div>

<!-- ══ 화면 2: 점수판 ══ -->
<div id="screen-play" class="screen">
  <div class="play-top">
    <a href="#" class="play-back-link" onclick="confirmBack(); return false;">← 나가기</a>
    <span class="match-info" id="match-info"></span>
  </div>

  <div class="set-bar">
    <span class="set-label">세트</span>
    <span class="set-score"><span class="blue" id="sets-blue">0</span> : <span class="red" id="sets-red">0</span></span>
  </div>

  <div class="court">
    <div class="side side-blue" id="side-blue" onclick="addPoint(0)">
      <div class="team-name">🔵 파랑팀 <span class="serve-ball" id="serve-0">🏐</span></div>
      <div class="score" id="score-0">0</div>
      <div class="tap-hint">탭하면 +1점</div>
    </div>
    <div class="net"></div>
    <div class="side side-red" id="side-red" onclick="addPoint(1)">
      <div class="team-name"><span class="serve-ball" id="serve-1">🏐</span> 빨강팀 🔴</div>
      <div class="score" id="score-1">0</div>
      <div class="tap-hint">탭하면 +1점</div>
    </div>
  </div>

  <div class="play-bottom">
    <button class="ctrl-btn" id="undo-btn" onclick="undo()">↩️ 무르기</button>
    <button class="ctrl-btn" onclick="confirmResetSet()">🔄 세트 초기화</button>
  </div>
</div>

<!-- ══ 오버레이: 세트 종료 ══ -->
<div class="overlay" id="set-overlay">
  <div class="overlay-card">
    <span class="overlay-emoji" id="set-emoji">🎉</span>
    <div class="overlay-title" id="set-title"></div>
    <div class="overlay-sub" id="set-sub"></div>
    <button class="overlay-btn" onclick="nextSet()">다음 세트 시작 ▶</button>
    <button class="overlay-btn ghost" onclick="undoFromOverlay()">↩️ 방금 득점 무르기</button>
  </div>
</div>

<!-- ══ 오버레이: 경기 종료 ══ -->
<div class="overlay" id="match-overlay">
  <div class="overlay-card">
    <span class="overlay-emoji">🏆</span>
    <div class="overlay-title" id="match-title"></div>
    <div class="overlay-sub" id="match-sub"></div>
    <button class="overlay-btn" onclick="rematch()">🔁 같은 설정으로 다시</button>
    <button class="overlay-btn ghost" onclick="goToSettings()">⚙️ 설정으로</button>
  </div>
</div>

<script>
/* ── 상태 ── */
const TEAM = ['파랑팀', '빨강팀'];
let S = {
  target: 11,
  totalSets: 3,
  deuce: true,
  scores: [0, 0],
  sets: [0, 0],
  serve: 0,          /* 현재 서브 팀 (0=파랑, 1=빨강) */
  firstServe: 0,     /* 이번 세트 첫 서브 팀 (세트마다 교대) */
  locked: false,     /* 오버레이 표시 중 득점 잠금 */
  history: [],       /* 무르기용 스냅샷 */
};

/* ── 설정 화면 ── */
function bindOptRow(rowId, attr, apply) {
  document.querySelectorAll('#' + rowId + ' .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#' + rowId + ' .opt-btn').forEach(b => b.classList.toggle('selected', b === btn));
      apply(btn.dataset[attr]);
    });
  });
}

function initSettings() {
  bindOptRow('target-row', 'target', v => S.target = parseInt(v, 10));
  bindOptRow('sets-row',   'sets',   v => S.totalSets = parseInt(v, 10));
  bindOptRow('deuce-row',  'deuce',  v => S.deuce = (v === 'on'));
  document.getElementById('start-btn').addEventListener('click', startMatch);
}

/* ── 경기 시작 ── */
function startMatch() {
  S.scores = [0, 0];
  S.sets = [0, 0];
  S.serve = 0;
  S.firstServe = 0;
  S.locked = false;
  S.history = [];
  render();
  showScreen('play');
}

function rematch() {
  document.getElementById('match-overlay').classList.remove('show');
  startMatch();
}

/* ── 화면 전환 ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ── 스냅샷 ── */
function snapshot() {
  S.history.push(JSON.stringify({ scores: [...S.scores], sets: [...S.sets], serve: S.serve, firstServe: S.firstServe }));
  if (S.history.length > 200) S.history.shift();
}

/* ── 득점 ── */
function addPoint(team) {
  if (S.locked) return;
  snapshot();
  S.scores[team]++;
  S.serve = team; /* 랠리 포인트: 득점 팀이 서브 */

  const el = document.getElementById('score-' + team);
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  try { if (navigator.vibrate) navigator.vibrate(30); } catch(e) {}
  playBeep(team === 0 ? 880 : 660);

  render();
  checkSetEnd();
}

/* ── 세트 종료 판정 ── */
function setWinner() {
  const [a, b] = S.scores;
  const t = S.target;
  if (S.deuce) {
    if (a >= t && a - b >= 2) return 0;
    if (b >= t && b - a >= 2) return 1;
  } else {
    if (a >= t) return 0;
    if (b >= t) return 1;
  }
  return -1;
}

function checkSetEnd() {
  const w = setWinner();
  if (w === -1) {
    /* 듀스 안내 */
    const [a, b] = S.scores;
    if (S.deuce && a >= S.target - 1 && b >= S.target - 1 && a === b) {
      document.getElementById('match-info').textContent = '🔥 듀스! 2점 차로 승리';
    }
    return;
  }
  S.locked = true;
  S.sets[w]++;

  const need = Math.ceil(S.totalSets / 2);
  if (S.sets[w] >= need) {
    /* 경기 종료 */
    document.getElementById('match-title').textContent = TEAM[w] + ' 최종 승리!';
    document.getElementById('match-sub').textContent =
      '세트 스코어 ' + S.sets[0] + ' : ' + S.sets[1] + ' — 모두 수고했어요! 👏';
    render();
    setTimeout(() => document.getElementById('match-overlay').classList.add('show'), 350);
  } else {
    document.getElementById('set-emoji').textContent = w === 0 ? '🔵' : '🔴';
    document.getElementById('set-title').textContent = TEAM[w] + ' 세트 승리!';
    document.getElementById('set-sub').textContent =
      S.scores[0] + ' : ' + S.scores[1] + ' · 현재 세트 스코어 ' + S.sets[0] + ' : ' + S.sets[1];
    render();
    setTimeout(() => document.getElementById('set-overlay').classList.add('show'), 350);
  }
}

/* ── 다음 세트 ── */
function nextSet() {
  document.getElementById('set-overlay').classList.remove('show');
  S.scores = [0, 0];
  S.firstServe = 1 - S.firstServe; /* 세트마다 첫 서브 교대 */
  S.serve = S.firstServe;
  S.locked = false;
  S.history = [];
  render();
}

/* ── 무르기 ── */
function undo() {
  if (S.history.length === 0) return;
  const prev = JSON.parse(S.history.pop());
  S.scores = prev.scores;
  S.sets = prev.sets;
  S.serve = prev.serve;
  S.firstServe = prev.firstServe;
  S.locked = false;
  render();
}

function undoFromOverlay() {
  document.getElementById('set-overlay').classList.remove('show');
  undo();
}

/* ── 세트 초기화 ── */
function confirmResetSet() {
  if (S.locked) return;
  if (confirm('현재 세트 점수를 0 : 0으로 되돌릴까요? (세트 스코어는 유지)')) {
    snapshot();
    S.scores = [0, 0];
    S.serve = S.firstServe;
    render();
  }
}

/* ── 렌더 ── */
function render() {
  document.getElementById('score-0').textContent = S.scores[0];
  document.getElementById('score-1').textContent = S.scores[1];
  document.getElementById('sets-blue').textContent = S.sets[0];
  document.getElementById('sets-red').textContent = S.sets[1];
  document.getElementById('serve-0').classList.toggle('on', S.serve === 0);
  document.getElementById('serve-1').classList.toggle('on', S.serve === 1);
  document.getElementById('undo-btn').disabled = S.history.length === 0;

  const setNo = S.sets[0] + S.sets[1] + 1;
  document.getElementById('match-info').textContent =
    (S.totalSets > 1 ? setNo + '세트 · ' : '') + S.target + '점 승리' + (S.deuce ? ' · 듀스' : '');
}

/* ── 나가기 ── */
function goToSettings() {
  document.getElementById('match-overlay').classList.remove('show');
  showScreen('settings');
}
function confirmBack() {
  if (confirm('경기를 멈추고 설정 화면으로 돌아갈까요?')) {
    showScreen('settings');
  }
}

/* ── 효과음 ── */
let audioCtx = null;
function playBeep(freq) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) {}
}

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', initSettings);
