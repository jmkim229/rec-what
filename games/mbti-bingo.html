  { label: '상상 잘 빠짐', sentence: '가끔 멍때리며 상상에 빠지는 편', axis: 'N', rare: false },

  { label: '계획표파', sentence: '여행 가기 전 계획표 짜는 편', axis: 'J', rare: false },
  { label: '마감 직전 폭주', sentence: '과제·일을 마감 직전에 몰아서 하는 편', axis: 'P', rare: false },
  { label: '정리 잘함', sentence: '책상·폰이 늘 정리돼 있는 편', axis: 'J', rare: false },
  { label: '즉흥 OK', sentence: '약속 즉흥 변경도 환영인 편', axis: 'P', rare: false },
  { label: '비상용품 챙김', sentence: '가방에 비상용품(반창고 등) 늘 들고 다니는 사람', axis: 'J', rare: true },
  { label: '무계획 여행', sentence: '계획 없이 훌쩍 떠나본 적 있는 사람', axis: 'P', rare: true },
  { label: 'To-do 리스트', sentence: '할 일을 리스트로 적어두는 편', axis: 'J', rare: false },
  { label: '벼락치기 능력자', sentence: '벼락치기에 강한 편', axis: 'P', rare: false },
  { label: 'MBTI 외움', sentence: '자기 MBTI를 외우고 다니는 사람', axis: '재미', rare: false },
  { label: '검사 3번+', sentence: 'MBTI 검사를 3번 이상 해본 사람', axis: '재미', rare: false },
  { label: '오늘 처음 본 사람', sentence: '오늘 처음 인사한 사람', axis: '재미', rare: false },
  { label: 'MBTI 바뀜', sentence: '최근에 MBTI가 바뀐 사람', axis: '재미', rare: true },
  { label: '가족 MBTI 다 앎', sentence: '가족 전원의 MBTI를 아는 사람', axis: '재미', rare: true },
  { label: '검사 안 해봄', sentence: 'MBTI 검사를 한 번도 안 해본 사람', axis: '재미', rare: true },
  { label: '나랑 같은 MBTI', sentence: '나와 MBTI가 같은 사람', axis: '재미', rare: false },
  { label: '정반대 MBTI', sentence: '나와 정반대 MBTI인 사람', axis: '재미', rare: true },
];

const AXIS_LABELS = { E:'E(외향)', I:'I(내향)', S:'S(감각)', N:'N(직관)', T:'T(사고)', F:'F(감정)', J:'J(판단)', P:'P(인식)', '재미':'재미 칸' };
const MAIN_AXES = ['E','I','S','N','T','F','P','J'];

/* ── URL 파라미터 읽기 ── */
const params = new URLSearchParams(location.search);
const SIZE = Math.min(5, Math.max(3, parseInt(params.get('size') || '4')));
const HAS_FREE = params.get('free') === '1';
const HAS_RARE = params.get('rare') === '1';

/* ── 상태 ── */
let cells = [];       // 배치된 셀 배열 { pool항목, checked, name, isFree }
let bingoLines = [];  // 완성된 줄 인덱스 배열
let activeCellIdx = -1;

/* ── 셔플 ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── 빙고 풀 생성 (MBTI 4축 균형) ── */
function buildBingoPool() {
  const totalCells = SIZE * SIZE;
  const needed = totalCells - (HAS_FREE ? 1 : 0);

  // 메인 8축에서 균등하게 뽑기
  const perAxis = Math.max(1, Math.floor(needed / MAIN_AXES.length));
  const shuffledAxes = shuffle([...MAIN_AXES]);
  let selected = [];

  shuffledAxes.forEach(ax => {
    const axPool = shuffle(POOL.filter(c => c.axis === ax));
    selected.push(...axPool.slice(0, perAxis));
  });

  // 부족한 슬롯을 재미 칸으로 채우기
  const remaining = needed - selected.length;
  if (remaining > 0) {
    const funPool = shuffle(POOL.filter(c => c.axis === '재미'));
    selected.push(...funPool.slice(0, remaining));
  }

  // 여전히 부족하면 메인 축에서 추가 뽑기
  if (selected.length < needed) {
    const usedLabels = new Set(selected.map(c => c.label));
    const extras = shuffle(POOL.filter(c => MAIN_AXES.includes(c.axis) && !usedLabels.has(c.label)));
    selected.push(...extras.slice(0, needed - selected.length));
  }

  return shuffle(selected.slice(0, needed));
}

/* ── 셀 초기화 ── */
function initCells() {
  const pool = buildBingoPool();
  const totalCells = SIZE * SIZE;
  const freeIdx = HAS_FREE ? Math.floor(SIZE / 2) * SIZE + Math.floor(SIZE / 2) : -1;

  cells = [];
  let poolIdx = 0;

  for (let i = 0; i < totalCells; i++) {
    if (i === freeIdx) {
      cells.push({ label: 'FREE', sentence: '', axis: '', rare: false, checked: true, name: 'FREE', isFree: true });
    } else {
      const item = pool[poolIdx++];
      cells.push({ ...item, checked: false, name: '', isFree: false });
    }
  }
}

/* ── CSS 셀 폰트 크기 계산 ── */
function getCellFontSize() {
  const vw = window.innerWidth;
  const gridWidth = vw - 24; // 12px padding * 2
  const cellWidth = (gridWidth - (SIZE - 1) * 5) / SIZE; // gap=5px
  return Math.min(14, Math.max(8, cellWidth / 5.5)) + 'px';
}

/* ── 그리드 렌더 ── */
function renderGrid() {
  const grid = document.getElementById('bingo-grid');
  grid.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
  const fs = getCellFontSize();

  grid.innerHTML = cells.map((cell, idx) => {
    let cls = 'bingo-cell';
    if (cell.isFree) cls += ' free-cell';
    else if (cell.checked) cls += ' checked';
    if (bingoLines.some(line => line.includes(idx))) cls += ' bingo-line';

    const rareBadge = (HAS_RARE && cell.rare && !cell.isFree) ? '<span class="rare-badge">★</span>' : '';
    const axisBadge = (!cell.isFree && cell.axis) ? `<span class="axis-badge">${cell.axis}</span>` : '';
    const nameEl = (cell.checked && !cell.isFree && cell.name)
      ? `<div class="cell-name">${escHtml(cell.name)}</div>` : '';

    return `<div class="${cls}" onclick="openModal(${idx})" style="--fs:${fs}">
      ${rareBadge}
      <div class="cell-label" style="font-size:${fs}">${escHtml(cell.label)}</div>
      ${nameEl}
      ${axisBadge}
    </div>`;
  }).join('');

  updateStatus();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 빙고 판정 ── */
function detectBingo() {
  const prev = bingoLines.length;
  bingoLines = [];

  // 가로
  for (let r = 0; r < SIZE; r++) {
    const line = [];
    for (let c = 0; c < SIZE; c++) line.push(r * SIZE + c);
    if (line.every(i => cells[i].checked)) bingoLines.push(line);
  }
  // 세로
  for (let c = 0; c < SIZE; c++) {
    const line = [];
    for (let r = 0; r < SIZE; r++) line.push(r * SIZE + c);
    if (line.every(i => cells[i].checked)) bingoLines.push(line);
  }
  // 대각선
  const diag1 = [], diag2 = [];
  for (let i = 0; i < SIZE; i++) {
    diag1.push(i * SIZE + i);
    diag2.push(i * SIZE + (SIZE - 1 - i));
  }
  if (diag1.every(i => cells[i].checked)) bingoLines.push(diag1);
  if (diag2.every(i => cells[i].checked)) bingoLines.push(diag2);

  if (bingoLines.length > prev) {
    showBingoBanner();
  }
}

function showBingoBanner() {
  const banner = document.getElementById('bingo-banner');
  banner.textContent = `🎉 빙고! ${bingoLines.length}줄 완성!`;
  banner.style.display = 'block';
  banner.style.animation = 'none';
  void banner.offsetWidth;
  banner.style.animation = 'bingoPop 0.4s cubic-bezier(0.34,1.56,0.64,1)';
}

/* ── 상태 업데이트 ── */
function updateStatus() {
  const checkedCnt = cells.filter(c => c.checked).length;
  const totalCnt = cells.length;
  document.getElementById('bingo-count').textContent = bingoLines.length;
  document.getElementById('checked-count').textContent = `${checkedCnt} / ${totalCnt} 칸 체크됨`;
}

/* ── 모달 ── */
function openModal(idx) {
  const cell = cells[idx];
  if (cell.isFree) return;

  activeCellIdx = idx;
  document.getElementById('modal-warn').textContent = '';
  document.getElementById('modal-axis').textContent = AXIS_LABELS[cell.axis] || cell.axis;
  document.getElementById('modal-sentence').textContent = cell.sentence;
  document.getElementById('modal-input').value = cell.name || '';

  const clearBtn = document.getElementById('modal-clear-btn');
  clearBtn.style.display = cell.checked ? 'block' : 'none';

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 300);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  activeCellIdx = -1;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function confirmCell() {
  const name = document.getElementById('modal-input').value.trim();
  const warnEl = document.getElementById('modal-warn');

  if (!name) {
    warnEl.textContent = '이름을 입력해 주세요';
    return;
  }

  // 1인 1칸 검사
  const duplicate = cells.findIndex((c, i) => i !== activeCellIdx && c.checked && !c.isFree && c.name === name);
  if (duplicate !== -1) {
    warnEl.textContent = `"${name}"은(는) 이미 다른 칸에 사인받은 사람이에요`;
    return;
  }

  cells[activeCellIdx].checked = true;
  cells[activeCellIdx].name = name;
  warnEl.textContent = '';
  closeModal();
  detectBingo();
  renderGrid();
}

function clearCell() {
  if (activeCellIdx < 0) return;
  cells[activeCellIdx].checked = false;
  cells[activeCellIdx].name = '';
  closeModal();
  detectBingo();
  renderGrid();
}

/* ── 엔터키 ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    confirmCell();
  }
  if (e.key === 'Escape') closeModal();
});

/* ── 초기화 ── */
function init() {
  document.getElementById('header-size').textContent = `${SIZE}×${SIZE}`;
  if (HAS_RARE) {
    document.getElementById('rare-notice').textContent = ' ★ 표시 칸은 보너스 레어 칸이에요!';
  }

  initCells();
  detectBingo();
  renderGrid();
}

window.addEventListener('resize', () => renderGrid());
init();
</script>
</body>
</html>
