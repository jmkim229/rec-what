  <style>

<body>

<!-- ══ 화면 1: 설정 ══ -->

<script>
/* ── 색깔 데이터 ── */
const COLOR_SETS = {
  basic: [
    { name: '빨강',   hex: '#FF0000' },
    { name: '주황',   hex: '#FF9500' },
    { name: '노랑',   hex: '#FFEB3B' },
    { name: '초록',   hex: '#4CAF50' },
    { name: '파랑',   hex: '#2196F3' },
    { name: '남색',   hex: '#1A237E' },
    { name: '보라',   hex: '#9C27B0' },
    { name: '분홍',   hex: '#FF80AB' },
  ],
  mid: [
    { name: '빨강',   hex: '#FF0000' },
    { name: '주황',   hex: '#FF9500' },
    { name: '노랑',   hex: '#FFEB3B' },
    { name: '초록',   hex: '#4CAF50' },
    { name: '파랑',   hex: '#2196F3' },
    { name: '남색',   hex: '#1A237E' },
    { name: '보라',   hex: '#9C27B0' },
    { name: '분홍',   hex: '#FF80AB' },
    { name: '검정',   hex: '#000000' },
    { name: '흰색',   hex: '#FFFFFF' },
    { name: '회색',   hex: '#9E9E9E' },
    { name: '갈색',   hex: '#795548' },
  ],
  adv: [
    { name: '빨강',   hex: '#FF0000' },
    { name: '주황',   hex: '#FF9500' },
    { name: '노랑',   hex: '#FFEB3B' },
    { name: '초록',   hex: '#4CAF50' },
    { name: '파랑',   hex: '#2196F3' },
    { name: '남색',   hex: '#1A237E' },
    { name: '보라',   hex: '#9C27B0' },
    { name: '분홍',   hex: '#FF80AB' },
    { name: '검정',   hex: '#000000' },
    { name: '흰색',   hex: '#FFFFFF' },
    { name: '회색',   hex: '#9E9E9E' },
    { name: '갈색',   hex: '#795548' },
    { name: '하늘색', hex: '#87CEEB' },
    { name: '살구색', hex: '#FFCBA4' },
    { name: '청록색', hex: '#00BCD4' },
    { name: '자주색', hex: '#C2185B' },
  ]
};

const CIRCUMFERENCE = 2 * Math.PI * 21; // r=21 → ≈131.95

/* ── 상태 ── */
let S = {
  difficulty: 'basic',
  mode: 'manual',
  intervalSec: 5,
  colors: [],
  deck: [],
  autoTimer: null,
  autoRemaining: 0,
  paused: false,
};
let currentColor = null;

/* ── 유틸: 배경 밝기에 따라 텍스트 색 결정 ── */
function textColorFor(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.55 ? 'dark' : 'light';
}

/* ── 유틸: Fisher-Yates 셔플 ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── 덱 보충: 직전 색 연속 방지 ── */
function refillDeck() {
  let d = shuffle(S.colors);
  if (currentColor && d.length > 1 && d[0].hex === currentColor.hex) {
    [d[0], d[1]] = [d[1], d[0]];
  }
  S.deck = d;
}

/* ── 다음 색 뽑기 ── */
function drawNext(random) {
  if (random) {
    const others = S.colors.filter(c => !currentColor || c.hex !== currentColor.hex);
    return others[Math.floor(Math.random() * others.length)] || S.colors[0];
  }
  if (S.deck.length === 0) refillDeck();
  return S.deck.shift();
}

/* ── 화면 전환 ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ── 설정 화면 이벤트 ── */
function initSettings() {
  document.querySelectorAll('[data-diff]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.difficulty = btn.dataset.diff;
      document.querySelectorAll('[data-diff]').forEach(b => b.classList.toggle('selected', b === btn));
    });
  });

  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.mode = btn.dataset.mode;
      document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('selected', b === btn));
      document.getElementById('interval-group').style.display = S.mode === 'auto' ? 'block' : 'none';
    });
  });

  document.querySelectorAll('[data-sec]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.intervalSec = parseInt(btn.dataset.sec);
      document.querySelectorAll('[data-sec]').forEach(b => b.classList.toggle('selected', b === btn));
    });
  });

  document.getElementById('start-btn').addEventListener('click', startGame);
}

/* ── 게임 시작 ── */
function startGame() {
  S.colors = [...COLOR_SETS[S.difficulty]];
  S.deck = [];
  currentColor = null;
  S.paused = false;

  document.getElementById('ctrl-manual').style.display = S.mode === 'manual' ? 'flex' : 'none';
  document.getElementById('ctrl-auto').style.display   = S.mode === 'auto'   ? 'flex' : 'none';
  document.getElementById('pause-btn').textContent = '⏸️ 일시정지';

  const cdWrap = document.getElementById('countdown-wrap');
  if (S.mode === 'auto') {
    cdWrap.classList.add('visible');
  } else {
    cdWrap.classList.remove('visible');
  }

  showScreen('play');

  // 첫 색깔 — 바로 표시 (트랜지션 없이)
  const nameEl = document.getElementById('color-name');
  nameEl.style.transition = 'none';
  nameEl.style.opacity = '1';
  applyColor(drawNext(false), true);
  setTimeout(() => { nameEl.style.transition = ''; }, 50);

  if (S.mode === 'auto') startAutoTimer();
}

/* ── 색 적용 ── */
function applyColor(color, instant) {
  if (!color) return;

  const playEl  = document.getElementById('screen-play');
  const nameEl  = document.getElementById('color-name');
  const backLink = document.getElementById('play-back-link');
  const cdText  = document.getElementById('countdown-text');
  const cdProg  = document.getElementById('countdown-circle');
  const cdTrack = document.querySelector('.countdown-track');

  const mode = textColorFor(color.hex);
  const tc   = mode === 'dark' ? 'rgba(20,20,20,0.82)' : 'rgba(255,255,255,0.95)';
  const shadow = mode === 'dark'
    ? '0 2px 8px rgba(0,0,0,0.18)'
    : '0 2px 14px rgba(0,0,0,0.45), 0 0 40px rgba(0,0,0,0.2)';
  const btnBg = mode === 'dark' ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.28)';
  const btnBorder = mode === 'dark' ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.25)';
  const btnColor = mode === 'dark' ? 'rgba(20,20,20,0.8)' : 'white';

  const applyStyles = () => {
    currentColor = color;
    playEl.style.backgroundColor = color.hex;
    nameEl.textContent = color.name;
    nameEl.style.color = tc;
    nameEl.style.textShadow = shadow;
    backLink.style.color = tc;

    cdText.style.color = tc;
    cdProg.style.stroke = mode === 'dark' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.8)';
    cdTrack.style.stroke = mode === 'dark' ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.18)';

    document.querySelectorAll('.ctrl-btn').forEach(b => {
      b.style.background   = b.classList.contains('ctrl-btn-ghost')
        ? (mode === 'dark' ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)')
        : b.classList.contains('ctrl-btn-sub')
          ? (mode === 'dark' ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.18)')
          : btnBg;
      b.style.borderColor  = btnBorder;
      b.style.color        = b.classList.contains('ctrl-btn-ghost')
        ? (mode === 'dark' ? 'rgba(20,20,20,0.55)' : 'rgba(255,255,255,0.6)')
        : btnColor;
    });
  };

  if (instant) {
    applyStyles();
    nameEl.style.opacity = '1';
    return;
  }

  // 페이드 아웃 → 텍스트+배경 변경 → 페이드 인
  nameEl.style.opacity = '0';
  setTimeout(() => {
    applyStyles();
    nameEl.style.opacity = '1';
  }, 180);
}

/* ── 수동: 다음 색 ── */
function nextColor(random) {
  applyColor(drawNext(random));
  playDing();
}

/* ── 자동 모드 타이머 ── */
function startAutoTimer() {
  clearInterval(S.autoTimer);
  S.autoRemaining = S.intervalSec;
  renderCountdown();

  S.autoTimer = setInterval(() => {
    if (S.paused) return;
    S.autoRemaining--;
    renderCountdown();
    if (S.autoRemaining <= 0) {
      applyColor(drawNext(false));
      playDing();
      S.autoRemaining = S.intervalSec;
      renderCountdown();
    }
  }, 1000);
}

function renderCountdown() {
  const frac = S.autoRemaining / S.intervalSec;
  const offset = CIRCUMFERENCE * (1 - frac);
  const circle = document.getElementById('countdown-circle');
  circle.style.strokeDasharray  = CIRCUMFERENCE;
  circle.style.strokeDashoffset = offset;
  document.getElementById('countdown-text').textContent = S.autoRemaining;
}

function togglePause() {
  S.paused = !S.paused;
  document.getElementById('pause-btn').textContent = S.paused ? '▶️ 재개' : '⏸️ 일시정지';
}

function skipColor() {
  applyColor(drawNext(false));
  playDing();
  S.autoRemaining = S.intervalSec;
  renderCountdown();
}

/* ── 처음으로 (설정 화면 복귀) ── */
function goToSettings() {
  clearInterval(S.autoTimer);
  document.getElementById('countdown-wrap').classList.remove('visible');
  showScreen('settings');
}

/* ── 게임 설명 페이지로 (확인창) ── */
function confirmBack() {
  if (confirm('게임 진행을 멈추고 게임 설명 페이지로 돌아갈까요?')) {
    clearInterval(S.autoTimer);
    location.href = 'color-hunt.html';
  }
}

/* ── 딩 효과음 ── */
let audioCtx = null;
function playDing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.45);
  } catch(e) {}
}

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', initSettings);
</script>
