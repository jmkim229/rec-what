<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업다운 진행자 도구 | 레크 뭐하지?</title>

  <link rel="stylesheet" href="../css/style.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════
       화면 1 – 진행자 전용
    ══════════════════════════════════ */
    #screen1 {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
    }

    .s1-badge {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 50px;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .s1-title {
      font-size: 30px;
      font-weight: 900;
      color: white;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .s1-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 40px;
    }

    .s1-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
    }

    .s1-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .range-group {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .range-btn {
      flex: 1;
      padding: 12px 6px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }

    .range-btn.active {
      background: #FF6B35;
      border-color: #FF6B35;
      color: white;
    }

    .number-input {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 36px;
      font-weight: 800;
      text-align: center;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .number-input::placeholder { color: rgba(255,255,255,0.2); }
    .number-input:focus { border-color: #FF6B35; }

    .random-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
      margin-bottom: 20px;
    }

    .random-btn:hover { background: rgba(255,255,255,0.1); color: white; }

    .complete-btn {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 24px rgba(255,107,53,0.4);
      transition: transform 0.15s;
    }

    .complete-btn:active { transform: scale(0.96); }

    .s1-error {
      color: #ff8a8a;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
    }

    /* ══════════════════════════════════
       화면 2 – 게임 진행
    ══════════════════════════════════ */
    #screen2 {
      display: none;
      min-height: 100vh;
      background: #fffbf7;
      flex-direction: column;
    }

    .range-header {
      background: linear-gradient(135deg, #1a1a2e, #2d2d5e);
      padding: 28px 20px 24px;
      text-align: center;
      transition: background 0.5s;
    }

    .range-header.last-bullet-mode {
      background: linear-gradient(135deg, #4a0000, #7f0000);
      animation: headerPulse 1s ease-in-out infinite;
    }

    @keyframes headerPulse {
      0%, 100% { background: linear-gradient(135deg, #4a0000, #7f0000); }
      50%       { background: linear-gradient(135deg, #7f0000, #b00000); }
    }

    .range-header-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .range-header-value {
      font-size: 42px;
      font-weight: 900;
      color: white;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .range-header-value span { color: #FFD700; }

    .game-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .call-label {
      font-size: 13px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      align-self: flex-start;
    }

    .call-input {
      width: 100%;
      padding: 24px 20px;
      border-radius: 18px;
      border: 3px solid #e8e8e8;
      background: white;
      font-size: 48px;
      font-weight: 900;
      text-align: center;
      font-family: inherit;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.18s;
      margin-bottom: 14px;
      letter-spacing: -1px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .call-input:focus { border-color: #FF6B35; }
    .call-input::placeholder { color: #ddd; font-size: 36px; }

    .confirm-btn {
      width: 100%;
      padding: 22px;
      border-radius: 18px;
      border: none;
      background: #1a1a2e;
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      transition: transform 0.15s;
      margin-bottom: 28px;
    }

    .confirm-btn:active { transform: scale(0.97); }

    .history-section { width: 100%; margin-bottom: 20px; }

    .history-label {
      font-size: 11px;
      font-weight: 700;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .history-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 90px;
      overflow-y: auto;
    }

    .history-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
    }

    .chip-up   { background: #dbeafe; color: #2563eb; }
    .chip-down { background: #fee2e2; color: #dc2626; }
    .chip-bomb { background: #fef3c7; color: #d97706; }

    .history-empty-text { font-size: 13px; color: #ddd; }

    .bottom-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 20px 40px;
      max-width: 480px;
      margin: 0 auto;
    }

    .newround-btn {
      padding: 18px;
      border-radius: 16px;
      border: 2px solid #e8e8e8;
      background: white;
      color: #555;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
      text-align: center;
    }

    .newround-btn:hover { border-color: #FF6B35; color: #FF6B35; }

    .home-link {
      display: block;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #bbb;
      text-decoration: none;
      padding: 12px;
      transition: color 0.18s;
    }

    .home-link:hover { color: #FF6B35; }

    /* ══════════════════════════════════
       업/다운 결과 오버레이
    ══════════════════════════════════ */
    #result-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #result-overlay.show { opacity: 1; pointer-events: all; }
    #result-overlay.overlay-up   { background: #1d4ed8; }
    #result-overlay.overlay-down { background: #b91c1c; }

    .result-text {
      font-size: 88px;
      font-weight: 900;
      color: white;
      letter-spacing: -3px;
      line-height: 1;
      text-shadow: 0 6px 40px rgba(0,0,0,0.3);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .result-sub {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      margin-top: 10px;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
    }

    /* ══════════════════════════════════
       💀 마지막 한 발 오버레이 (Stage 1-3)
    ══════════════════════════════════ */
    #lb-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 9000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      animation: strobeRedSlow 2s ease-in-out infinite;
    }

    #lb-overlay.show { display: flex; }
    #lb-overlay.strobe-fast { animation: strobeRedFast 0.6s ease-in-out infinite, heartbeat 1.4s ease-in-out infinite; }

    /* 가장자리 경광등 효과 */
    @keyframes strobeRedSlow {
      0%, 100% { box-shadow: inset 0 0 60px 20px rgba(180,0,0,0); }
      50%       { box-shadow: inset 0 0 120px 50px rgba(220,0,0,0.55); }
    }

    @keyframes strobeRedFast {
      0%, 100% { box-shadow: inset 0 0 80px 30px rgba(220,0,0,0); }
      50%       { box-shadow: inset 0 0 160px 70px rgba(255,0,0,0.8); }
    }

    @keyframes heartbeat {
      0%, 90%, 100% { transform: scale(1); }
      45%            { transform: scale(1.02); }
    }

    /* Stage 1 콘텐츠 */
    #lb-s1 {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
    }

    #lb-skull {
      font-size: clamp(1.8rem, 9vw, 4rem);
      font-weight: 900;
      color: white;
      text-align: center;
      white-space: nowrap;
      letter-spacing: -1px;
      line-height: 1.15;
      animation: textTremor 0.18s linear infinite;
      text-shadow: 0 0 40px rgba(255,0,0,0.6);
      margin-bottom: 12px;
    }

    @keyframes textTremor {
      0%   { transform: translate(0, 0) rotate(0); }
      15%  { transform: translate(-2px, 1px) rotate(-0.4deg); }
      30%  { transform: translate(3px, -1px) rotate(0.4deg); }
      45%  { transform: translate(-3px, 2px) rotate(-0.3deg); }
      60%  { transform: translate(2px, -2px) rotate(0.3deg); }
      75%  { transform: translate(-2px, 1px) rotate(-0.4deg); }
      90%  { transform: translate(3px, -1px) rotate(0.4deg); }
      100% { transform: translate(0, 0) rotate(0); }
    }

    #lb-alert-sub {
      font-size: clamp(0.8rem, 4vw, 1rem);
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      margin-bottom: 40px;
    }

    /* Stage 2: 이름 입력 */
    #lb-name-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #lb-name-area.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .lb-input-label {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.3px;
    }

    #lb-name-input {
      width: 100%;
      padding: 18px 20px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
      letter-spacing: -0.5px;
    }

    #lb-name-input::placeholder { color: rgba(255,255,255,0.2); }
    #lb-name-input:focus { border-color: #ff4444; }

    #lb-fate-btn {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #b91c1c, #ff4444);
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 24px rgba(185,28,28,0.5);
      transition: transform 0.15s;
    }

    #lb-fate-btn:active { transform: scale(0.96); }

    /* Stage 3: 주인공 등장 */
    #lb-s3 {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
    }

    #lb-name-display {
      font-size: clamp(2.5rem, 15vw, 5rem);
      font-weight: 900;
      color: white;
      text-align: center;
      white-space: nowrap;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 0 60px rgba(255,80,80,0.8);
      animation: nameEnter 0.7s cubic-bezier(0.34,1.56,0.64,1) both, nameShake 0.25s linear 0.7s infinite;
      margin-bottom: 20px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes nameEnter {
      from { transform: scale(0.2) rotate(-8deg); opacity: 0; }
      60%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
      to   { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes nameShake {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-3px, 1px); }
      50%  { transform: translate(3px, -1px); }
      75%  { transform: translate(-2px, 2px); }
      100% { transform: translate(0, 0); }
    }

    #lb-name-sub {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 0.6s ease 1.2s forwards;
      margin-bottom: 48px;
    }

    #lb-continue-btn {
      padding: 18px 40px;
      border-radius: 50px;
      border: 3px solid rgba(255,255,255,0.35);
      background: transparent;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      opacity: 0;
      animation: fadeInUp 0.5s ease 2.5s forwards;
      transition: background 0.18s;
    }

    #lb-continue-btn:hover { background: rgba(255,255,255,0.15); }

    /* ══════════════════════════════════
       💣 폭탄 폭발 오버레이 (Stage 4)
    ══════════════════════════════════ */
    #be-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      overflow: hidden;
    }

    #be-overlay.show {
      display: flex;
      animation: screenShake 0.6s ease 0.3s;
    }

    @keyframes screenShake {
      0%, 100% { transform: translateX(0) rotate(0); }
      10%       { transform: translateX(-18px) rotate(-1.5deg); }
      25%       { transform: translateX(18px) rotate(1.5deg); }
      40%       { transform: translateX(-12px) rotate(-1deg); }
      55%       { transform: translateX(12px) rotate(1deg); }
      70%       { transform: translateX(-6px) rotate(-0.5deg); }
      85%       { transform: translateX(6px) rotate(0.5deg); }
    }

    /* 흰색 번쩍 */
    #be-flash {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 10001;
      pointer-events: none;
      animation: whiteFlash 0.5s ease forwards;
    }

    @keyframes whiteFlash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    #be-bomb-text {
      font-size: 80px;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 0 60px rgba(255,215,0,0.6);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
      margin-bottom: 12px;
    }

    #be-winner {
      font-size: 42px;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
      margin-bottom: 50px;
    }

    #be-newround-btn {
      padding: 18px 48px;
      border-radius: 50px;
      border: 3px solid rgba(255,255,255,0.4);
      background: transparent;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      animation: fadeInUp 0.5s ease 1.5s both;
      transition: background 0.18s;
    }

    #be-newround-btn:hover { background: rgba(255,255,255,0.15); }

    /* 파편 파티클 */
    #be-particles {
      position: absolute;
      top: 50%;
      left: 50%;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      font-size: 26px;
      animation: particleFly 1.6s ease-out forwards;
      transform-origin: center;
    }

    @keyframes particleFly {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.2) rotate(var(--rot)); opacity: 0; }
    }

    /* ══════════════════════════════════
       공통 키프레임
    ══════════════════════════════════ */
    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* 모바일 대응 */
    @media (max-width: 480px) {
      .s1-title { font-size: 24px; }
      .number-input { font-size: 28px; padding: 16px; }
      .range-header-value { font-size: 34px; }
      .call-input { font-size: 40px; padding: 20px 16px; }
      .call-input::placeholder { font-size: 28px; }
      .confirm-btn { padding: 18px; font-size: 18px; }
      .result-text { font-size: 72px; }
      #be-bomb-text { font-size: 64px; }
      #be-winner { font-size: 32px; }
    }
  </style>

  <!-- 상단 뒤로가기 -->
  <div style="position: fixed; top: 0; left: 0; right: 0; z-index: 7000; background: rgba(10,10,10,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 10px 16px;">
    <a href="updown.html" style="display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 600; padding: 6px 4px; transition: color 0.18s;">

  <!-- ══════════════════════════════
       화면 1: 진행자 전용
  ══════════════════════════════ -->
  <div id="screen1" style="padding-top: 60px;">
    <div class="s1-badge">진행자 전용</div>
    <h1 class="s1-title">🤫 진행자만 보세요</h1>
    <p class="s1-sub">참가자에게 화면을 보여주지 마세요!</p>

    <div style="background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;margin-bottom:20px;border-left:3px solid #60a5fa;">
      <p style="font-size:13px;color:#94a3b8;line-height:1.75;margin:0;">이 도구는 <strong style="color:#e2e8f0;">업다운 게임</strong>의 진행자 전용 숫자 설정 화면입니다. 비밀 숫자를 정하면 참가자들이 업·다운 힌트를 받으며 숫자를 맞추는 게임이에요. 게임 방법은 <a href="updown.html" style="color:#93c5fd;">업다운 게임 페이지</a>에서 확인하세요.</p>
    </div>

    <div class="s1-card">
      <div class="s1-label">숫자 범위</div>
      <div class="range-group">
        <button class="range-btn" data-max="30">1~30</button>
        <button class="range-btn" data-max="50">1~50</button>
        <button class="range-btn active" data-max="100">1~100</button>
      </div>

      <div class="s1-label">비밀 숫자</div>
      <input class="number-input" type="number" id="secretInput" placeholder="?" inputmode="numeric">
      <button class="random-btn" id="randomBtn">🎲 랜덤으로 정하기</button>
      <button class="complete-btn" id="completeBtn">✅ 완료 — 게임 시작!</button>
      <div class="s1-error" id="s1Error"></div>
    </div>
  </div>

  <!-- ══════════════════════════════
       화면 2: 게임 진행
  ══════════════════════════════ -->
  <div id="screen2">
    <div class="range-header" id="rangeHeader">
      <div class="range-header-label">현재 범위</div>
      <div class="range-header-value">
        <span id="rangeMin">1</span> ~ <span id="rangeMax">100</span>
      </div>
    </div>

    <div class="game-body">
      <div class="call-label">참가자가 외친 숫자</div>
      <input class="call-input" type="number" id="callInput" placeholder="?" inputmode="numeric">
      <button class="confirm-btn" id="confirmBtn">✅ 확인</button>

      <div class="history-section">
        <div class="history-label">기록</div>
        <div class="history-scroll" id="historyList">
          <span class="history-empty-text">아직 기록 없음</span>
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="newround-btn" id="newRoundBtn">🔄 새 라운드 (새 비밀 숫자 입력)</button>
      <a class="home-link" href="updown.html">🏠 게임 설명으로 돌아가기</a>
    </div>
  </div>

  <!-- ══════════════════════════════
       업/다운 결과 오버레이
  ══════════════════════════════ -->
  <div id="result-overlay">
    <div class="result-text" id="resultText"></div>
    <div class="result-sub"  id="resultSub"></div>
  </div>

  <!-- ══════════════════════════════
       💀 마지막 한 발 오버레이 (Stage 1-3)
  ══════════════════════════════ -->
  <div id="lb-overlay">
    <!-- Stage 1+2: 알림 + 이름 입력 -->
    <div id="lb-s1">
      <div id="lb-skull">💀 마지막 한 발...</div>
      <div id="lb-alert-sub">운명의 주인공은 누구일까요?</div>
      <div id="lb-name-area">
        <div class="lb-input-label">🎯 주인공 이름을 입력하세요</div>
        <input type="text" id="lb-name-input" placeholder="이름 입력..." autocomplete="off">
        <button id="lb-fate-btn">운명 결정 ▶</button>
      </div>
    </div>

    <!-- Stage 3: 주인공 등장 -->
    <div id="lb-s3">
      <div id="lb-name-display"></div>
      <div id="lb-name-sub"></div>
      <button id="lb-continue-btn">▶ 게임 계속하기</button>
    </div>
  </div>

  <!-- ══════════════════════════════
       💣 폭탄 폭발 오버레이 (Stage 4)
  ══════════════════════════════ -->
  <div id="be-overlay">
    <div id="be-flash"></div>
    <div id="be-bomb-text">💣 폭탄!</div>
    <div id="be-winner"></div>
    <div id="be-particles"></div>
    <button id="be-newround-btn">🔄 새 라운드</button>
  </div>

  <script>
    /* ──────────────────────────────
       상태 변수
    ────────────────────────────── */
    let secretNumber   = null;
    let rangeMax       = 100;
    let currentMin     = 1;
    let currentMax     = 100;
    let history        = [];
    let resultTimer    = null;
    let lastBulletActive = false;   // 마지막 한 발 발동 여부
    let protagonistName  = '';      // 주인공 이름

    /* ──────────────────────────────
       화면 1: 범위 / 랜덤 / 완료
    ────────────────────────────── */
    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        rangeMax = parseInt(btn.dataset.max);
      });
    });

    document.getElementById('randomBtn').addEventListener('click', () => {
      document.getElementById('secretInput').value = Math.floor(Math.random() * rangeMax) + 1;
      document.getElementById('s1Error').textContent = '';
    });

    document.getElementById('completeBtn').addEventListener('click', () => {
      const val = parseInt(document.getElementById('secretInput').value);
      if (isNaN(val) || val < 1 || val > rangeMax) {
        document.getElementById('s1Error').textContent = `1~${rangeMax} 사이의 숫자를 입력해주세요`;
        return;
      }
      secretNumber     = val;
      currentMin       = 1;
      currentMax       = rangeMax;
      history          = [];
      lastBulletActive = false;
      protagonistName  = '';

      document.getElementById('rangeHeader').classList.remove('last-bullet-mode');
      updateRangeDisplay();
      renderHistory();
      document.getElementById('callInput').value = '';
      document.getElementById('screen1').style.display = 'none';
      document.getElementById('screen2').style.display = 'flex';
      document.getElementById('callInput').focus();
    });

    /* ──────────────────────────────
       화면 2: 확인 처리
    ────────────────────────────── */
    document.getElementById('confirmBtn').addEventListener('click', handleConfirm);
    document.getElementById('callInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleConfirm();
    });

    function handleConfirm() {
      const val = parseInt(document.getElementById('callInput').value);
      if (isNaN(val)) return;

      if (val < currentMin || val > currentMax) {
        showUpDown('⬌ 범위 밖!', `${currentMin}~${currentMax} 사이만 가능`, 'overlay-down', 1400);
        return;
      }

      document.getElementById('callInput').value = '';

      if (val === secretNumber) {
        // 폭탄!
        history.push({ num: val, type: 'bomb' });
        renderHistory();
        showBombExplosion();
        return;
      }

      if (val < secretNumber) {
        currentMin = Math.max(currentMin, val + 1);
        history.push({ num: val, type: 'up' });
      } else {
        currentMax = Math.min(currentMax, val - 1);
        history.push({ num: val, type: 'down' });
      }

      updateRangeDisplay();
      renderHistory();

      const hint    = val < secretNumber ? 'up' : 'down';
      const label   = hint === 'up' ? '⬆️ 업!' : '⬇️ 다운!';
      const newRange = `${currentMin} ~ ${currentMax}`;
      showUpDown(label, newRange, hint === 'up' ? 'overlay-up' : 'overlay-down', 2000);

      // 마지막 한 발 체크 (업/다운 결과 오버레이 닫힌 후 발동)
      if (currentMin === currentMax && !lastBulletActive) {
        setTimeout(() => showLastBulletStage1(), 2100);
      }
    }

    /* ──────────────────────────────
       업/다운 결과 오버레이
    ────────────────────────────── */
    function showUpDown(text, sub, colorClass, duration) {
      if (resultTimer) clearTimeout(resultTimer);
      const overlay = document.getElementById('result-overlay');
      const textEl  = document.getElementById('resultText');
      const subEl   = document.getElementById('resultSub');

      overlay.className = colorClass + ' show';
      resetAnim(textEl); textEl.textContent = text;
      resetAnim(subEl);  subEl.textContent  = sub;

      resultTimer = setTimeout(() => {
        overlay.classList.remove('show');
        if (currentMin !== currentMax || lastBulletActive) {
          document.getElementById('callInput').focus();
        }
      }, duration);
    }

    document.getElementById('result-overlay').addEventListener('click', () => {
      if (resultTimer) { clearTimeout(resultTimer); resultTimer = null; }
      document.getElementById('result-overlay').classList.remove('show');
      document.getElementById('callInput').focus();
    });

    /* ──────────────────────────────
       Stage 1: 마지막 한 발 알림
    ────────────────────────────── */
    function showLastBulletStage1() {
      // 범위 헤더 레드모드
      document.getElementById('rangeHeader').classList.add('last-bullet-mode');

      const overlay = document.getElementById('lb-overlay');
      overlay.classList.add('show');

      // Stage 1 보이고 Stage 3 숨김
      document.getElementById('lb-s1').style.display = 'flex';
      document.getElementById('lb-s3').style.display = 'none';

      // 1.5초 후 이름 입력 등장
      setTimeout(() => {
        document.getElementById('lb-name-area').classList.add('visible');
        document.getElementById('lb-name-input').focus();
      }, 1500);
    }

    /* ──────────────────────────────
       Stage 2 → 3: 운명 결정 클릭
    ────────────────────────────── */
    document.getElementById('lb-fate-btn').addEventListener('click', () => {
      const name = document.getElementById('lb-name-input').value.trim();
      if (!name) { document.getElementById('lb-name-input').focus(); return; }

      protagonistName = name;

      // Stage 1 → Stage 3 전환
      document.getElementById('lb-s1').style.display = 'none';

      const s3 = document.getElementById('lb-s3');
      s3.style.display = 'flex';

      // 이름 / 부제 세팅 (애니메이션 리셋)
      const nameEl = document.getElementById('lb-name-display');
      const subEl  = document.getElementById('lb-name-sub');
      const conBtn = document.getElementById('lb-continue-btn');

      resetAnim(nameEl); nameEl.textContent = name;
      resetAnim(subEl);  subEl.textContent  = `${name}님... 운명의 시간이 다가옵니다...`;
      resetAnim(conBtn);

      // 경광등 빠르게 + 심장박동
      document.getElementById('lb-overlay').classList.add('strobe-fast');

      // 이름 입력 초기화 (다음 라운드를 위해)
      document.getElementById('lb-name-input').value = '';
      document.getElementById('lb-name-area').classList.remove('visible');
    });

    /* ──────────────────────────────
       Stage 3: 게임 계속하기
    ────────────────────────────── */
    document.getElementById('lb-continue-btn').addEventListener('click', () => {
      document.getElementById('lb-overlay').classList.remove('show', 'strobe-fast');
      lastBulletActive = true;
      document.getElementById('callInput').focus();
    });

    /* ──────────────────────────────
       Stage 4: 폭탄 폭발
    ────────────────────────────── */
    function showBombExplosion() {
      const overlay = document.getElementById('be-overlay');

      // 흰색 번쩍
      const flash = document.getElementById('be-flash');
      resetAnim(flash);
      flash.style.display = 'block';
      setTimeout(() => { flash.style.display = 'none'; }, 600);

      // 당첨자 이름
      const winnerEl = document.getElementById('be-winner');
      resetAnim(winnerEl);
      winnerEl.textContent = protagonistName
        ? `${protagonistName}님 당첨! 🎉`
        : '💣 폭탄 당첨!';

      // 폭발 텍스트 리셋
      resetAnim(document.getElementById('be-bomb-text'));
      resetAnim(document.getElementById('be-newround-btn'));

      // 파티클 생성
      createParticles();

      overlay.classList.add('show');
    }

    function createParticles() {
      const container = document.getElementById('be-particles');
      container.innerHTML = '';
      const emojis = ['💥','⭐','✨','🎆','🎉','💫','🔥','🎊','⚡','🌟'];
      for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const angle    = (i / 28) * 360;
        const dist     = 140 + Math.random() * 200;
        const rad      = angle * Math.PI / 180;
        const tx       = Math.cos(rad) * dist;
        const ty       = Math.sin(rad) * dist;
        const rot      = (Math.random() - 0.5) * 720 + 'deg';
        p.style.cssText = `--tx:${tx}px;--ty:${ty}px;--rot:${rot};animation-delay:${Math.random() * 0.25}s`;
        container.appendChild(p);
      }
    }

    /* Stage 4 → 새 라운드 */
    document.getElementById('be-newround-btn').addEventListener('click', goToNewRound);

    /* ──────────────────────────────
       새 라운드 / 공통 초기화
    ────────────────────────────── */
    document.getElementById('newRoundBtn').addEventListener('click', goToNewRound);

    function goToNewRound() {
      document.getElementById('be-overlay').classList.remove('show');
      document.getElementById('lb-overlay').classList.remove('show', 'strobe-fast');
      document.getElementById('screen2').style.display = 'none';
      document.getElementById('rangeHeader').classList.remove('last-bullet-mode');
      document.getElementById('secretInput').value = '';
      document.getElementById('s1Error').textContent = '';
      document.getElementById('screen1').style.display = 'flex';
    }

    /* ──────────────────────────────
       유틸
    ────────────────────────────── */
    function updateRangeDisplay() {
      document.getElementById('rangeMin').textContent = currentMin;
      document.getElementById('rangeMax').textContent = currentMax;
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (!history.length) {
        list.innerHTML = '<span class="history-empty-text">아직 기록 없음</span>';
        return;
      }
      list.innerHTML = history.map(h => {
        const cls  = h.type === 'up' ? 'chip-up' : h.type === 'down' ? 'chip-down' : 'chip-bomb';
        const icon = h.type === 'up' ? '⬆️' : h.type === 'down' ? '⬇️' : '💣';
        return `<span class="history-chip ${cls}">${h.num} ${icon}</span>`;
      }).join('');
    }

    function resetAnim(el) {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    }
  </script>
</body>
</html>
