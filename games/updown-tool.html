<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업다운 진행자 도구 | 레크 뭐하지?</title>
  <link rel="stylesheet" href="../css/style.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-75JKFQWSHP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-75JKFQWSHP');
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ════════════════════════════
       화면 1 – 진행자 전용
    ════════════════════════════ */
    #screen1 {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
    }

    .s1-badge {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 50px;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .s1-title {
      font-size: 30px;
      font-weight: 900;
      color: white;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .s1-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 40px;
    }

    .s1-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
    }

    .s1-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    /* 범위 선택 버튼 */
    .range-group {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .range-btn {
      flex: 1;
      padding: 12px 6px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }

    .range-btn.active {
      background: #FF6B35;
      border-color: #FF6B35;
      color: white;
    }

    /* 숫자 입력 */
    .number-input {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 36px;
      font-weight: 800;
      text-align: center;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .number-input::placeholder { color: rgba(255,255,255,0.2); }
    .number-input:focus { border-color: #FF6B35; }

    /* 버튼들 */
    .random-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
      margin-bottom: 20px;
    }

    .random-btn:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .complete-btn {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 24px rgba(255,107,53,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .complete-btn:active { transform: scale(0.96); }

    .s1-error {
      color: #ff8a8a;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
    }

    /* ════════════════════════════
       화면 2 – 게임 진행
    ════════════════════════════ */
    #screen2 {
      display: none;
      min-height: 100vh;
      background: #fffbf7;
      flex-direction: column;
    }

    /* 상단 범위 표시 */
    .range-header {
      background: linear-gradient(135deg, #1a1a2e, #2d2d5e);
      padding: 28px 20px 24px;
      text-align: center;
    }

    .range-header-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .range-header-value {
      font-size: 42px;
      font-weight: 900;
      color: white;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .range-header-value span {
      color: #FFD700;
    }

    /* 입력 영역 */
    .game-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .call-label {
      font-size: 13px;
      font-weight: 700;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      align-self: flex-start;
    }

    .call-input {
      width: 100%;
      padding: 24px 20px;
      border-radius: 18px;
      border: 3px solid #e8e8e8;
      background: white;
      font-size: 48px;
      font-weight: 900;
      text-align: center;
      font-family: inherit;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.18s;
      margin-bottom: 14px;
      letter-spacing: -1px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .call-input:focus { border-color: #FF6B35; }
    .call-input::placeholder { color: #ddd; font-size: 36px; }

    .confirm-btn {
      width: 100%;
      padding: 22px;
      border-radius: 18px;
      border: none;
      background: #1a1a2e;
      color: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 28px;
    }

    .confirm-btn:active { transform: scale(0.97); }

    /* 히스토리 */
    .history-section {
      width: 100%;
      margin-bottom: 20px;
    }

    .history-label {
      font-size: 11px;
      font-weight: 700;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .history-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 90px;
      overflow-y: auto;
    }

    .history-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
    }

    .chip-up   { background: #dbeafe; color: #2563eb; }
    .chip-down { background: #fee2e2; color: #dc2626; }
    .chip-bomb { background: #fef3c7; color: #d97706; }

    .history-empty-text {
      font-size: 13px;
      color: #ddd;
    }

    /* 하단 버튼 */
    .bottom-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 20px 40px;
      max-width: 480px;
      margin: 0 auto;
    }

    .newround-btn {
      padding: 18px;
      border-radius: 16px;
      border: 2px solid #e8e8e8;
      background: white;
      color: #555;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
      text-align: center;
    }

    .newround-btn:hover { border-color: #FF6B35; color: #FF6B35; }

    .home-link {
      display: block;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #bbb;
      text-decoration: none;
      padding: 12px;
      transition: color 0.18s;
    }

    .home-link:hover { color: #FF6B35; }

    /* ════════════════════════════
       결과 오버레이
    ════════════════════════════ */
    #result-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #result-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    #result-overlay.overlay-up   { background: #1d4ed8; }
    #result-overlay.overlay-down { background: #b91c1c; }
    #result-overlay.overlay-bomb { background: #111827; }

    .result-emoji {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 8px;
      animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .result-text {
      font-size: 88px;
      font-weight: 900;
      color: white;
      letter-spacing: -3px;
      line-height: 1;
      text-shadow: 0 6px 40px rgba(0,0,0,0.3);
      animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) 0.05s both;
    }

    .result-sub {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      margin-top: 10px;
      animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }

    .bomb-number {
      font-size: 120px;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: -4px;
      line-height: 1;
      text-shadow: 0 8px 48px rgba(255,215,0,0.4);
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
      display: none;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-12px) rotate(-2deg); }
      40%       { transform: translateX(12px)  rotate(2deg); }
      60%       { transform: translateX(-8px)  rotate(-1deg); }
      80%       { transform: translateX(8px)   rotate(1deg); }
    }

    #result-overlay.overlay-bomb { animation: shake 0.5s ease 0.1s; }

    /* 모바일 대응 */
    @media (max-width: 480px) {
      .s1-title { font-size: 24px; }
      .number-input { font-size: 28px; padding: 16px; }
      .range-header-value { font-size: 34px; }
      .call-input { font-size: 40px; padding: 20px 16px; }
      .call-input::placeholder { font-size: 28px; }
      .confirm-btn { padding: 18px; font-size: 18px; }
      .result-text { font-size: 72px; }
      .bomb-number { font-size: 96px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════
       화면 1: 진행자 전용
  ══════════════════════════════ -->
  <div id="screen1">
    <div class="s1-badge">진행자 전용</div>
    <h1 class="s1-title">🤫 진행자만 보세요</h1>
    <p class="s1-sub">참가자에게 화면을 보여주지 마세요!</p>

    <div class="s1-card">
      <div class="s1-label">숫자 범위</div>
      <div class="range-group">
        <button class="range-btn" data-max="30">1~30</button>
        <button class="range-btn" data-max="50">1~50</button>
        <button class="range-btn active" data-max="100">1~100</button>
      </div>

      <div class="s1-label">비밀 숫자</div>
      <input class="number-input" type="number" id="secretInput" placeholder="?" inputmode="numeric">
      <button class="random-btn" id="randomBtn">🎲 랜덤으로 정하기</button>
      <button class="complete-btn" id="completeBtn">✅ 완료 — 게임 시작!</button>
      <div class="s1-error" id="s1Error"></div>
    </div>
  </div>

  <!-- ══════════════════════════════
       화면 2: 게임 진행
  ══════════════════════════════ -->
  <div id="screen2">
    <div class="range-header">
      <div class="range-header-label">현재 범위</div>
      <div class="range-header-value" id="rangeDisplay">
        <span id="rangeMin">1</span> ~ <span id="rangeMax">100</span>
      </div>
    </div>

    <div class="game-body">
      <div class="call-label">참가자가 외친 숫자</div>
      <input class="call-input" type="number" id="callInput" placeholder="?" inputmode="numeric">
      <button class="confirm-btn" id="confirmBtn">✅ 확인</button>

      <div class="history-section">
        <div class="history-label">기록</div>
        <div class="history-scroll" id="historyList">
          <span class="history-empty-text">아직 기록 없음</span>
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <button class="newround-btn" id="newRoundBtn">🔄 새 라운드 (새 비밀 숫자 입력)</button>
      <a class="home-link" href="updown.html">🏠 게임 설명으로 돌아가기</a>
    </div>
  </div>

  <!-- ══════════════════════════════
       결과 오버레이
  ══════════════════════════════ -->
  <div id="result-overlay">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-text"  id="resultText"></div>
    <div class="bomb-number"  id="bombNumber"></div>
    <div class="result-sub"   id="resultSub"></div>
  </div>

  <script>
    let secretNumber = null;
    let rangeMax = 100;
    let currentMin = 1;
    let currentMax = 100;
    let history = [];
    let overlayTimer = null;

    // ── 범위 버튼 ──
    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        rangeMax = parseInt(btn.dataset.max);
      });
    });

    // ── 랜덤 버튼 ──
    document.getElementById('randomBtn').addEventListener('click', () => {
      const n = Math.floor(Math.random() * rangeMax) + 1;
      document.getElementById('secretInput').value = n;
      document.getElementById('s1Error').textContent = '';
    });

    // ── 완료 버튼 ──
    document.getElementById('completeBtn').addEventListener('click', () => {
      const val = parseInt(document.getElementById('secretInput').value);
      if (isNaN(val) || val < 1 || val > rangeMax) {
        document.getElementById('s1Error').textContent = `1~${rangeMax} 사이의 숫자를 입력해주세요`;
        return;
      }
      secretNumber = val;
      currentMin = 1;
      currentMax = rangeMax;
      history = [];

      updateRangeDisplay();
      renderHistory();
      document.getElementById('callInput').value = '';
      document.getElementById('screen1').style.display = 'none';
      document.getElementById('screen2').style.display = 'flex';
      document.getElementById('callInput').focus();
    });

    // ── 확인 버튼 ──
    document.getElementById('confirmBtn').addEventListener('click', handleConfirm);
    document.getElementById('callInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleConfirm();
    });

    function handleConfirm() {
      const val = parseInt(document.getElementById('callInput').value);
      if (isNaN(val)) return;

      if (val < currentMin || val > currentMax) {
        showResult('범위 밖!', '범위 밖!', `${currentMin}~${currentMax} 사이만 가능해요`, 'overlay-down', '❌', null, 1500);
        return;
      }

      document.getElementById('callInput').value = '';

      if (val < secretNumber) {
        currentMin = Math.max(currentMin, val + 1);
        history.push({ num: val, type: 'up' });
        updateRangeDisplay();
        renderHistory();
        showResult('overlay-up', '⬆️ 업!', `${currentMin} ~ ${currentMax}`, 'overlay-up', '⬆️', null, 2000);
      } else if (val > secretNumber) {
        currentMax = Math.min(currentMax, val - 1);
        history.push({ num: val, type: 'down' });
        updateRangeDisplay();
        renderHistory();
        showResult('overlay-down', '⬇️ 다운!', `${currentMin} ~ ${currentMax}`, 'overlay-down', '⬇️', null, 2000);
      } else {
        history.push({ num: val, type: 'bomb' });
        renderHistory();
        showResult('overlay-bomb', '💣 폭탄!', '비밀 숫자는...', 'overlay-bomb', '💣', secretNumber, 3000);
      }
    }

    function showResult(overlayClass, text, sub, colorClass, emoji, bombNum, duration) {
      if (overlayTimer) clearTimeout(overlayTimer);

      const overlay  = document.getElementById('result-overlay');
      const textEl   = document.getElementById('resultText');
      const subEl    = document.getElementById('resultSub');
      const emojiEl  = document.getElementById('resultEmoji');
      const bombEl   = document.getElementById('bombNumber');

      overlay.className = '';
      overlay.classList.add(colorClass);

      // reset animations
      [textEl, subEl, emojiEl, bombEl].forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      });

      emojiEl.textContent = '';
      textEl.textContent  = text;
      subEl.textContent   = sub;

      if (bombNum !== null) {
        bombEl.style.display = 'block';
        bombEl.textContent   = bombNum;
        emojiEl.textContent  = emoji;
      } else {
        bombEl.style.display = 'none';
        emojiEl.textContent  = '';
      }

      overlay.classList.add('show');

      overlayTimer = setTimeout(() => {
        overlay.classList.remove('show');
        document.getElementById('callInput').focus();
      }, duration);
    }

    // 오버레이 탭하면 즉시 닫기
    document.getElementById('result-overlay').addEventListener('click', () => {
      if (overlayTimer) { clearTimeout(overlayTimer); overlayTimer = null; }
      document.getElementById('result-overlay').classList.remove('show');
      document.getElementById('callInput').focus();
    });

    function updateRangeDisplay() {
      document.getElementById('rangeMin').textContent = currentMin;
      document.getElementById('rangeMax').textContent = currentMax;
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<span class="history-empty-text">아직 기록 없음</span>';
        return;
      }
      list.innerHTML = history.map(h => {
        const cls  = h.type === 'up' ? 'chip-up' : h.type === 'down' ? 'chip-down' : 'chip-bomb';
        const icon = h.type === 'up' ? '⬆️' : h.type === 'down' ? '⬇️' : '💣';
        return `<span class="history-chip ${cls}">${h.num} ${icon}</span>`;
      }).join('');
    }

    // ── 새 라운드 ──
    document.getElementById('newRoundBtn').addEventListener('click', () => {
      secretNumber = null;
      document.getElementById('secretInput').value = '';
      document.getElementById('s1Error').textContent = '';
      document.getElementById('screen2').style.display = 'none';
      document.getElementById('screen1').style.display = 'flex';
    });
  </script>
</body>
</html>
