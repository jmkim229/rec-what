      <span class="card-emoji" id="card-emoji">🃏</span>

<script>
/* ── 동물 데이터 ── */
/* 난이도별 분류: easy(대표 동물) / medium(구체적 종) / hard(흉내 까다로움) */
const ANIMALS = {
  easy: [
    { emoji: '🐘', name: '코끼리' },
    { emoji: '🐰', name: '토끼' },
    { emoji: '🐸', name: '개구리' },

  ],
  medium: [

    { emoji: '🦉', name: '부엉이' },

    { emoji: '🐋', name: '고래' },
    { emoji: '🐬', name: '돌고래' },
    { emoji: '🦭', name: '물개' },
    { emoji: '🐊', name: '악어' },
    { emoji: '🐢', name: '거북이' },
    { emoji: '🦘', name: '캥거루' },
    { emoji: '🦊', name: '여우' },
    { emoji: '🐺', name: '늑대' },
    { emoji: '🐿️', name: '다람쥐' },
    { emoji: '🦌', name: '사슴' },
    { emoji: '🦒', name: '기린' },
    { emoji: '🦓', name: '얼룩말' },
    { emoji: '🐼', name: '판다' },
    { emoji: '🦍', name: '고릴라' },
  ],
  hard: [
    { emoji: '🦥', name: '나무늘보' },
    { emoji: '🦎', name: '카멜레온' },
    { emoji: '🐙', name: '문어' },
    { emoji: '🦑', name: '오징어' },
    { emoji: '🦐', name: '새우' },
    { emoji: '🪼', name: '해파리' },
    { emoji: '🦀', name: '게' },
    { emoji: '🦚', name: '공작새' },
    { emoji: '🦩', name: '홍학' },
    { emoji: '🦇', name: '박쥐' },
    { emoji: '🦛', name: '하마' },
    { emoji: '🦏', name: '코뿔소' },
    { emoji: '🐫', name: '낙타' },
    { emoji: '🐌', name: '달팽이' },
    { emoji: '🪱', name: '지렁이' },
    { emoji: '🦦', name: '수달' },
    { emoji: '🦔', name: '고슴도치' },
    { emoji: '🐝', name: '꿀벌' },
    { emoji: '🐜', name: '개미' },
    { emoji: '🦋', name: '나비' },
  ]
};
ANIMALS.all = [...ANIMALS.easy, ...ANIMALS.medium, ...ANIMALS.hard];

/* ── 상태 ── */
let S = {
  countKey: 'easy',
  animals: [],
  deck: [],
  lastAnimal: null,
  isDrawing: false,
  cardShown: false,
};

/* ── Fisher-Yates 셔플 ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── 덱 보충: 직전 동물 연속 방지 ── */
function refillDeck() {
  let d = shuffle(S.animals);
  if (S.lastAnimal && d.length > 1 && d[0].name === S.lastAnimal.name) {
    [d[0], d[1]] = [d[1], d[0]];
  }
  S.deck = d;
}

/* ── 화면 전환 ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ── 설정 화면 이벤트 ── */
function initSettings() {
  document.querySelectorAll('[data-count]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.countKey = btn.dataset.count;
      document.querySelectorAll('[data-count]').forEach(b => b.classList.toggle('selected', b === btn));
    });
  });
  document.getElementById('start-btn').addEventListener('click', startGame);
}

/* ── 게임 시작 ── */
function startGame() {
  S.animals = [...ANIMALS[S.countKey]];
  S.deck = [];
  S.lastAnimal = null;
  S.cardShown = false;

  const emojiEl = document.getElementById('card-emoji');
  const nameEl  = document.getElementById('card-name');
  emojiEl.textContent = '🃏';
  nameEl.textContent  = '버튼을 눌러\n카드를 뽑아요!';
  nameEl.style.fontSize = '';
  nameEl.style.color = '#94a3b8';

  document.getElementById('deck-counter').textContent = '';
  document.getElementById('draw-btn').disabled = false;

  showScreen('play');
}

/* ── 카드 뽑기 ── */
function drawCard() {
  if (S.isDrawing) return;
  S.isDrawing = true;

  const drawBtn = document.getElementById('draw-btn');
  const emojiEl = document.getElementById('card-emoji');
  const nameEl  = document.getElementById('card-name');
  drawBtn.disabled = true;

  if (S.deck.length === 0) refillDeck();
  const target = S.deck.shift();

  /* 두구두구 연출: 랜덤 이모지가 빠르게 바뀜 (선택된 난이도 풀에서만) */
  const allEmojis = S.animals.map(a => a.emoji);
  let rollCount = 0;
  const totalRolls = 10;
  const rollInterval = setInterval(() => {
    const rand = allEmojis[Math.floor(Math.random() * allEmojis.length)];
    emojiEl.textContent = rand;
    emojiEl.style.fontSize = '';
    nameEl.textContent = '...';
    nameEl.style.color = '#94a3b8';
    rollCount++;
    if (rollCount >= totalRolls) {
      clearInterval(rollInterval);
      revealCard(target);
    }
  }, 80);
}

/* ── 카드 공개 ── */
function revealCard(animal) {
  const emojiEl = document.getElementById('card-emoji');
  const nameEl  = document.getElementById('card-name');

  emojiEl.textContent = animal.emoji;
  emojiEl.classList.remove('pop');
  void emojiEl.offsetWidth; /* reflow for animation restart */
  emojiEl.classList.add('pop');

  nameEl.textContent = animal.name;
  nameEl.style.fontSize = '';
  nameEl.style.color = '#1e293b';

  S.lastAnimal = animal;
  S.cardShown = true;
  S.isDrawing = false;

  updateDeckCounter();
  playDing();

  document.getElementById('draw-btn').disabled = false;
}

/* ── 덱 카운터 표시 ── */
function updateDeckCounter() {
  const remaining = S.deck.length;
  const total = S.animals.length;
  const used = total - remaining;
  document.getElementById('deck-counter').textContent =
    remaining === 0
      ? `🔄 ${total}마리 완료! 다음 뽑기부터 다시 섞여요`
      : `남은 카드 ${remaining}장 / 전체 ${total}마리`;
}

/* ── 처음으로 (설정 화면 복귀) ── */
function goToSettings() {
  showScreen('settings');
}

/* ── 게임 설명 페이지로 (확인창) ── */
function confirmBack() {
  if (confirm('게임 진행을 멈추고 게임 설명 페이지로 돌아갈까요?')) {
    location.href = 'animal-imitate.html';
  }
}

/* ── 딩 효과음 ── */
let audioCtx = null;
function playDing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1046, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(784, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.28, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.5);
  } catch(e) {}
}

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', initSettings);
</script>
