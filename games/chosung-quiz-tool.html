    .c-tile:nth-child(3) { animation-delay: 0.10s; }
    .c-tile:nth-child(4) { animation-delay: 0.15s; }
    .c-tile:nth-child(5) { animation-delay: 0.20s; }
    @keyframes tileIn {
      from { opacity: 0; transform: scale(0.7) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }

<!-- ── 카테고리 탭 ── -->
<div class="cat-tabs" id="catTabs">
  <button class="cat-tab active" data-cat="all">전체</button>
  <button class="cat-tab" data-cat="animal">🐾 동물</button>
  <button class="cat-tab" data-cat="food">🍜 음식</button>
  <button class="cat-tab" data-cat="object">📦 사물</button>
  <button class="cat-tab" data-cat="job">💼 직업</button>
  <button class="cat-tab" data-cat="sports">⚽ 스포츠</button>
  <button class="cat-tab" data-cat="idiom">📖 사자성어</button>
</div>

<!-- ── 질문 영역 ── -->
<div class="question-area" id="questionArea">

  <div id="noQuestion">
    <div class="no-question">
      <div class="no-q-emoji">🔤</div>
      <div class="no-q-title">문제를 뽑아 시작하세요!</div>
      <div class="no-q-sub">아래 버튼을 누르면 초성이 나타납니다</div>
    </div>
  </div>

  <div id="questionView" style="display:none; width:100%; display:none; align-items:center; flex-direction:column;">
    <div class="q-counter" id="qCounter"></div>

    <div class="q-meta-row" id="qMeta"></div>

    <div class="chosung-display" id="chosungDisplay"></div>

    <div class="hint-text" id="hintText" style="display:none;"></div>

    <div class="answer-text" id="answerText" style="display:none;"></div>

<!-- ── 액션 버튼 ── -->
<div class="action-area">
  <button class="main-btn" id="mainBtn" onclick="handleMain()">문제 뽑기</button>

  <div class="hint-action-row" id="hintRow" style="display:none;">
    <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 힌트 보기 (1/2)</button>
    <button class="answer-btn" id="answerBtn" onclick="showAnswer()">✅ 정답 보기</button>
  </div>

  <button class="secondary-btn" id="reshuffleBtn" onclick="reshufflePool()" style="display:none;">🔄 다시 섞기</button>
</div>

<script>
/* ── 초성 추출 ── */
const CS = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function getChosung(word) {
  return word.split('').map(ch => {
    const code = ch.charCodeAt(0);
    if (code < 0xAC00 || code > 0xD7A3) return null;
    return CS[Math.floor((code - 0xAC00) / 588)];
  }).filter(c => c !== null);
}

/* ── 단어 데이터 ── */
const CAT_LABEL = {
  animal:'🐾 동물', food:'🍜 음식', object:'📦 사물',
  job:'💼 직업', sports:'⚽ 스포츠', idiom:'📖 사자성어'
};

const WORDS = {
  animal: ['강아지','고양이','호랑이','코끼리','펭귄','다람쥐','고슴도치','기린','너구리','원숭이','돌고래','부엉이'],
  food:   ['김치찌개','떡볶이','비빔밥','삼겹살','치킨','라면','김밥','불고기','떡국','잡채','순두부','갈비탕'],
  object: ['냉장고','세탁기','텔레비전','가위','우산','칫솔','칠판','자전거','안경','연필','컴퓨터','청소기'],
  job:    ['의사','선생님','경찰관','소방관','요리사','가수','운동선수','변호사','간호사','미용사'],
  sports: ['축구','야구','농구','배구','수영','태권도','탁구','배드민턴','스키','양궁','골프','펜싱'],
  idiom:  ['일석이조','유비무환','작심삼일','새옹지마','금상첨화','죽마고우','청출어람','권선징악','다다익선','대기만성']
};

/* ── 상태 ── */
let S = {
  cat: 'all',
  pool: [],
  allItems: [],
  current: null,
  hintLevel: 0,
  answerShown: false,
  scoreA: 0,
  scoreB: 0,
  shown: 0
};

function getItems(cat) {
  if (cat === 'all') return Object.entries(WORDS).flatMap(([c, arr]) => arr.map(w => ({ word: w, cat: c })));
  return (WORDS[cat] || []).map(w => ({ word: w, cat }));
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPool() {
  S.allItems = getItems(S.cat);
  S.pool = shuffle(S.allItems.map((_, i) => i));
  S.shown = 0;
}

/* ── 카테고리 탭 ── */
document.querySelectorAll('.cat-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.cat = btn.dataset.cat;
    buildPool();
    resetView();
  });
});

function resetView() {
  S.current = null;
  S.hintLevel = 0;
  S.answerShown = false;
  document.getElementById('noQuestion').style.display = 'block';
  document.getElementById('questionView').style.display = 'none';
  document.getElementById('hintRow').style.display = 'none';
  document.getElementById('reshuffleBtn').style.display = 'none';
  document.getElementById('mainBtn').textContent = '문제 뽑기';
}

/* ── 메인 버튼 핸들러 ── */
function handleMain() {
  if (S.pool.length === 0) buildPool();

  const idx = S.pool.pop();
  S.current = S.allItems[idx];
  S.shown++;
  S.hintLevel = 0;
  S.answerShown = false;

  renderQuestion(S.current);

  document.getElementById('mainBtn').textContent = S.pool.length === 0 ? '🔄 처음부터' : '다음 문제';

  if (S.shown > 1) document.getElementById('reshuffleBtn').style.display = 'block';

  const remaining = S.pool.length;
  document.getElementById('qCounter').textContent =
    remaining === 0
      ? `✅ ${S.allItems.length}개 모두 완료!`
      : `${S.shown} / ${S.allItems.length}`;
}

/* ── 질문 렌더링 ── */
function renderQuestion(item) {
  document.getElementById('noQuestion').style.display = 'none';
  const qv = document.getElementById('questionView');
  qv.style.display = 'flex';

  // 메타 배지
  const meta = document.getElementById('qMeta');
  const cs = getChosung(item.word);
  meta.innerHTML =
    `<span class="q-meta-badge highlight">${CAT_LABEL[item.cat]}</span>` +
    `<span class="q-meta-badge">${item.word.length}글자</span>`;

  // 초성 타일
  renderTiles(cs, false);

  // 힌트/정답 초기화
  document.getElementById('hintText').style.display = 'none';
  document.getElementById('answerText').style.display = 'none';

  // 힌트 버튼
  const hintBtn = document.getElementById('hintBtn');
  hintBtn.textContent = '💡 힌트 (1/2)';
  hintBtn.disabled = false;
  document.getElementById('hintRow').style.display = 'grid';
  document.getElementById('answerBtn').disabled = false;
}

function renderTiles(cs, isAnswer) {
  const display = document.getElementById('chosungDisplay');
  display.innerHTML = '';
  cs.forEach((ch, i) => {
    const tile = document.createElement('div');
    tile.className = 'c-tile' + (isAnswer ? ' answer-tile' : '');
    tile.style.animationDelay = (i * 0.05) + 's';
    tile.textContent = ch;
    display.appendChild(tile);
  });
}

/* ── 힌트 ── */
function showHint() {
  if (!S.current || S.answerShown) return;
  S.hintLevel++;

  const hintText = document.getElementById('hintText');
  const hintBtn = document.getElementById('hintBtn');

  if (S.hintLevel === 1) {
    // 글자 수 힌트
    hintText.textContent = `총 ${S.current.word.length}글자입니다!`;
    hintText.style.display = 'block';
    // 애니메이션 재실행
    hintText.style.animation = 'none';
    void hintText.offsetWidth;
    hintText.style.animation = '';

    hintBtn.textContent = '💡 첫 글자 공개 (2/2)';

  } else if (S.hintLevel === 2) {
    // 첫 글자 공개
    const firstChar = S.current.word[0];
    hintText.textContent = `첫 글자: "${firstChar}"`;
    hintText.style.animation = 'none';
    void hintText.offsetWidth;
    hintText.style.animation = '';

    // 첫 번째 타일을 실제 글자로 교체
    const tiles = document.querySelectorAll('.c-tile');
    if (tiles[0]) {
      tiles[0].textContent = firstChar;
      tiles[0].classList.add('revealed');
    }

    hintBtn.disabled = true;
    hintBtn.textContent = '💡 힌트 완료';
  }
}

/* ── 정답 공개 ── */
function showAnswer() {
  if (!S.current) return;
  S.answerShown = true;

  // 초성 → 실제 글자로 교체
  const chars = S.current.word.split('');
  const display = document.getElementById('chosungDisplay');
  display.innerHTML = '';
  chars.forEach((ch, i) => {
    const tile = document.createElement('div');
    tile.className = 'c-tile answer-tile';
    tile.style.animationDelay = (i * 0.06) + 's';
    tile.textContent = ch;
    display.appendChild(tile);
  });

  // 정답 텍스트
  const answerText = document.getElementById('answerText');
  answerText.textContent = S.current.word;
  answerText.style.display = 'block';
  answerText.style.animation = 'none';
  void answerText.offsetWidth;
  answerText.style.animation = '';

  // 힌트 텍스트 숨기기
  document.getElementById('hintText').style.display = 'none';

  // 버튼 비활성화
  document.getElementById('hintBtn').disabled = true;
  document.getElementById('answerBtn').disabled = true;
}

/* ── 다시 섞기 ── */
function reshufflePool() {
  buildPool();
  resetView();
  document.getElementById('reshuffleBtn').style.display = 'none';
}

/* ── 팀 점수 ── */
function score(team, delta) {
  if (team === 'a') {
    S.scoreA = Math.max(0, S.scoreA + delta);
    document.getElementById('scoreA').textContent = S.scoreA;
  } else {
    S.scoreB = Math.max(0, S.scoreB + delta);
    document.getElementById('scoreB').textContent = S.scoreB;
  }
}

/* ── 초기화 ── */
buildPool();
</script>
